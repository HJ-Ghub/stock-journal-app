    function cssEscape(value) {
      if (window.CSS && CSS.escape) return CSS.escape(value);
      return String(value).replace(/["\\]/g, '\\$&');
    }

    function editableRootFromRange(range) {
      if (!range) return null;
      const node = range.commonAncestorContainer.nodeType === 1 ? range.commonAncestorContainer : range.commonAncestorContainer.parentElement;
      return node ? node.closest('.rich-editor[contenteditable="true"]') : null;
    }

    function restoreSavedSelection() {
      const sel = window.getSelection();
      if (!sel || !savedSelectionRange) return false;
      const rootEl = editableRootFromRange(savedSelectionRange);
      if (!rootEl) return false;
      sel.removeAllRanges();
      sel.addRange(savedSelectionRange);
      return true;
    }

    function saveCurrentRichSelection() {
      const sel = window.getSelection();
      if (!sel || !sel.rangeCount) return;
      const range = sel.getRangeAt(0);
      if (editableRootFromRange(range)) savedSelectionRange = range.cloneRange();
    }


    function wrapSelectionWithStyle(styleObj) {
      restoreSavedSelection();
      const sel = window.getSelection();
      if (!sel || !sel.rangeCount || sel.isCollapsed) {
        alert('노트/메모 등 기록창에서 글자를 드래그한 뒤 사용해 주세요.');
        return false;
      }
      const range = sel.getRangeAt(0);
      const editor = editableRootFromRange(range);
      if (!editor) {
        alert('서식은 사용자가 작성하는 기록창 글자에 적용됩니다.');
        return false;
      }
      const span = document.createElement('span');
      Object.assign(span.style, styleObj);
      try {
        range.surroundContents(span);
      } catch (e) {
        const fragment = range.extractContents();
        span.appendChild(fragment);
        range.insertNode(span);
      }
      sel.removeAllRanges();
      const newRange = document.createRange();
      newRange.selectNodeContents(span);
      sel.addRange(newRange);
      syncRichEditors();
      return true;
    }

    function eraseSelectedStyle() {
      restoreSavedSelection();
      const sel = window.getSelection();
      if (!sel || !sel.rangeCount || sel.isCollapsed) {
        alert('지울 서식이 있는 글자를 드래그한 뒤 사용해 주세요.');
        return;
      }
      const range = sel.getRangeAt(0);
      const editor = editableRootFromRange(range);
      if (!editor) {
        alert('지우개는 기록창 글자 서식에 적용됩니다.');
        return;
      }
      document.execCommand('removeFormat', false, null);
      syncRichEditors();
    }

    function undoRichStyle() {
      const active = document.activeElement && document.activeElement.closest ? document.activeElement.closest('.rich-editor[contenteditable="true"]') : null;
      if (!active && !restoreSavedSelection()) {
        alert('노트나 추가노트 입력칸에서 되돌릴 내용을 선택하거나 커서를 둔 뒤 사용해 주세요.');
        return;
      }
      document.execCommand('undo', false, null);
      syncRichEditors();
    }

    function applyQuickFormat(kind) {
      if (kind === 'bold' || kind === 'underline') {
        restoreSavedSelection();
        const cmd = kind === 'bold' ? 'bold' : 'underline';
        document.execCommand(cmd, false, null);
        syncRichEditors();
        return;
      }
      const map = {
        'color-black': { color: '#111827' },
        'color-red': { color: '#d93025' },
        'color-blue': { color: '#1769d1' },
        'color-purple': { color: '#7c3aed' },
        'mark-yellow': { backgroundColor: '#fff3a3' },
        'mark-green': { backgroundColor: '#dff6df' },
        'size-large': { fontSize: '18px' },
        'size-normal': { fontSize: '15px' }
      };
      const styleObj = map[kind] || {};
      if (!Object.keys(styleObj).length) return;
      if (wrapSelectionWithStyle(styleObj)) rememberFormatPreset(Object.assign(currentFormatPreset(), styleObj.backgroundColor ? { highlightColor: styleObj.backgroundColor } : {}, styleObj.color ? { textColor: styleObj.color } : {}, styleObj.fontSize ? { fontSize: styleObj.fontSize } : {}));
    }

    function applySelectedStyle(mode) {
      const style = currentFormatPreset();
      if (mode === 'highlight') {
        if (wrapSelectionWithStyle({ backgroundColor: style.highlightColor })) rememberFormatPreset(style);
      } else {
        if (wrapSelectionWithStyle({ fontFamily: style.fontFamily, fontSize: style.fontSize, color: style.textColor })) rememberFormatPreset(style);
      }
    }

    function applyFormatPreset(index) {
      const preset = (app.formatRecents || [])[Number(index)];
      if (!preset) return;
      const p = normalizeFormatPreset(preset);
      app.uiStyle = Object.assign(defaultUiStyle(), app.uiStyle || {}, p);
      applyUiStyle();
      wrapSelectionWithStyle({ fontFamily: p.fontFamily, fontSize: p.fontSize, color: p.textColor });
    }


    function disableSpellcheck() {
      document.querySelectorAll('input, textarea, [contenteditable="true"]').forEach(el => {
        try {
          el.setAttribute('spellcheck', 'false');
          el.setAttribute('autocomplete', el.getAttribute('autocomplete') || 'off');
        } catch (e) { /* ignore */ }
      });
    }

    function focusContenteditableEnd(el) {
      if (!el) return;
      el.focus();
      const range = document.createRange();
      range.selectNodeContents(el);
      range.collapse(false);
      const sel = window.getSelection();
      if (sel) {
        sel.removeAllRanges();
        sel.addRange(range);
      }
    }

    function focusPendingTodayEditor() {
      if (!pendingTodayFocus) return;
      const selector = pendingTodayFocus;
      pendingTodayFocus = null;
      const el = document.querySelector(selector);
      focusContenteditableEnd(el);
    }

    function syncTodayTaskEditor(el) {
      if (!el || el.dataset.action !== 'task-rich-text') return;
      const record = ensureRecord(selectedDate);
      const type = el.dataset.type;
      const idx = Number(el.dataset.index);
      if (!record[type] || !record[type][idx]) return;
      const html = cleanHtml(el.innerHTML || '');
      const text = el.innerText || plainFromHtml(html);
      record[type][idx].textHtml = html;
      record[type][idx].text = text.replace(/[\r\n]+/g, ' ').trim();
      saveApp();
    }

    function syncTodayWatchEditor(el) {
      if (!el || !['watch-rich-name', 'watch-rich-reason'].includes(el.dataset.action)) return;
      const record = ensureRecord(selectedDate);
      const idx = Number(el.dataset.index);
      record.watch = Array.isArray(record.watch) ? record.watch : [];
      if (!record.watch[idx]) return;
      const html = cleanHtml(el.innerHTML || '');
      const text = el.innerText || plainFromHtml(html);
      if (el.dataset.action === 'watch-rich-name') {
        record.watch[idx].nameHtml = html;
        record.watch[idx].name = text.replace(/[\r\n]+/g, ' ').trim();
      } else {
        record.watch[idx].reasonHtml = html;
        record.watch[idx].reason = text.replace(/[\r\n]+/g, ' ').trim();
      }
      saveApp();
    }

    function addTaskAfterEnter(type, index) {
      const record = ensureRecord(selectedDate);
      record[type] = Array.isArray(record[type]) ? record[type] : [];
      const nextIndex = Number(index) + 1;
      record[type].splice(nextIndex, 0, { done: false, text: '', textHtml: '' });
      pendingTodayFocus = `[data-action="task-rich-text"][data-type="${cssEscape(type)}"][data-index="${nextIndex}"]`;
      saveApp();
      render();
    }

    function addWatchAfterEnter(index) {
      const record = ensureRecord(selectedDate);
      record.watch = Array.isArray(record.watch) ? record.watch : [];
      const nextIndex = Number(index) + 1;
      record.watch.splice(nextIndex, 0, { name: '', nameHtml: '', reason: '', reasonHtml: '' });
      pendingTodayFocus = `[data-action="watch-rich-name"][data-index="${nextIndex}"]`;
      saveApp();
      render();
    }

    function handleTodayRichEnter(target) {
      if (!target || !target.dataset) return false;
      const action = target.dataset.action;
      if (action === 'task-rich-text') {
        syncTodayTaskEditor(target);
        addTaskAfterEnter(target.dataset.type, target.dataset.index);
        return true;
      }
      if (action === 'watch-rich-name') {
        syncTodayWatchEditor(target);
        const record = ensureRecord(selectedDate);
        const idx = Number(target.dataset.index);
        const item = record.watch[idx] || {};
        const reasonEl = document.querySelector(`[data-action="watch-rich-reason"][data-index="${idx}"]`);
        if (!String(item.reason || '').trim() && reasonEl) {
          focusContenteditableEnd(reasonEl);
        } else {
          addWatchAfterEnter(idx);
        }
        return true;
      }
      if (action === 'watch-rich-reason') {
        syncTodayWatchEditor(target);
        addWatchAfterEnter(target.dataset.index);
        return true;
      }
      return false;
    }

    function getNoteWrapperFromButton(button) {
      const active = document.activeElement && document.activeElement.closest ? document.activeElement.closest('.note-draw-wrapper') : null;
      if (active) return active;
      const selected = savedSelectionRange ? editableRootFromRange(savedSelectionRange)?.closest('.note-draw-wrapper') : null;
      if (selected) return selected;
      const modal = button?.closest?.('.modal');
      if (modal) return modal.querySelector('.note-draw-wrapper');
      return root.querySelector('.note-draw-wrapper') || document.querySelector('.note-draw-wrapper');
    }

    function getNoteDrawRecordDate(wrapper) {
      return wrapper?.dataset?.date || selectedDate;
    }

    function noteCanvasIsBlank(canvas) {
      if (!canvas) return true;
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
      for (let i = 3; i < data.length; i += 4) {
        if (data[i] > 2) return false;
      }
      return true;
    }

    function saveNoteDrawDataFromCanvas(canvas) {
      const wrapper = canvas?.closest?.('.note-draw-wrapper');
      if (!wrapper) return;
      const date = getNoteDrawRecordDate(wrapper);
      const record = ensureRecord(date);
      if (noteCanvasIsBlank(canvas)) {
        record.noteDrawData = '';
        wrapper.classList.remove('has-drawing');
      } else {
        record.noteDrawData = canvas.toDataURL('image/png');
        wrapper.classList.add('has-drawing');
      }
      saveApp();
    }

    function saveVisibleNoteDrawData(date = selectedDate) {
      document.querySelectorAll(`.note-draw-canvas[data-date="${cssEscape(date)}"]`).forEach(canvas => saveNoteDrawDataFromCanvas(canvas));
    }

    function loadNoteDrawToCanvas(canvas) {
      const wrapper = canvas?.closest?.('.note-draw-wrapper');
      if (!wrapper) return;
      const rect = wrapper.getBoundingClientRect();
      const width = Math.max(1, Math.round(rect.width));
      const height = Math.max(1, Math.round(rect.height));
      const existingData = ensureRecord(getNoteDrawRecordDate(wrapper)).noteDrawData || '';
      if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;
        canvas.height = height;
      }
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (existingData) {
        const img = new Image();
        img.onload = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          wrapper.classList.add('has-drawing');
        };
        img.src = existingData;
      } else {
        wrapper.classList.remove('has-drawing');
      }
    }

    function initNoteDrawCanvases() {
      document.querySelectorAll('.note-draw-canvas').forEach(canvas => {
        loadNoteDrawToCanvas(canvas);
        if (canvas.dataset.ready === '1') return;
        canvas.dataset.ready = '1';
        canvas.addEventListener('pointerdown', startNoteDrawStroke);
        canvas.addEventListener('pointermove', moveNoteDrawStroke);
        canvas.addEventListener('pointerup', endNoteDrawStroke);
        canvas.addEventListener('pointercancel', endNoteDrawStroke);
        canvas.addEventListener('pointerleave', endNoteDrawStroke);
      });
    }

    function setNoteDrawColorFromButton(button) {
      const input = button?.closest?.('.inline-format-toolbar')?.querySelector('.note-draw-color');
      noteDrawState.color = input?.value || noteDrawState.color || '#d93025';
    }

    function toggleNoteDraw(button) {
      const wrapper = getNoteWrapperFromButton(button);
      if (!wrapper) { alert('오늘의 기록 노트창에서 사용할 수 있습니다.'); return; }
      setNoteDrawColorFromButton(button);
      initNoteDrawCanvases();
      const active = wrapper.classList.toggle('drawing');
      const editor = wrapper.querySelector('.rich-editor');
      if (active) {
        editor?.blur?.();
        toast('노트 위 펜쓰기 ON · 노트 위에 직접 그리세요');
      } else {
        const canvas = wrapper.querySelector('.note-draw-canvas');
        saveNoteDrawDataFromCanvas(canvas);
        toast('노트 위 펜쓰기 저장 완료');
      }
    }

    function clearNoteDraw(button) {
      const wrapper = getNoteWrapperFromButton(button);
      const canvas = wrapper?.querySelector?.('.note-draw-canvas');
      if (!canvas) { alert('지울 노트 펜선이 없습니다.'); return; }
      if (!confirm('노트 위에 그린 펜선을 모두 지울까요? 글자 내용은 그대로 유지됩니다.')) return;
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const record = ensureRecord(getNoteDrawRecordDate(wrapper));
      record.noteDrawData = '';
      wrapper.classList.remove('has-drawing', 'drawing');
      saveApp();
      toast('노트 펜선 삭제 완료');
    }

    function notePoint(e, canvas) {
      const rect = canvas.getBoundingClientRect();
      return { x: (e.clientX - rect.left) * (canvas.width / rect.width), y: (e.clientY - rect.top) * (canvas.height / rect.height) };
    }

    function startNoteDrawStroke(e) {
      const canvas = e.currentTarget;
      const wrapper = canvas.closest('.note-draw-wrapper');
      if (!wrapper?.classList.contains('drawing')) return;
      e.preventDefault();
      noteDrawState.activeCanvas = canvas;
      noteDrawState.drawing = true;
      noteDrawState.lastPoint = notePoint(e, canvas);
      canvas.setPointerCapture?.(e.pointerId);
    }

    function moveNoteDrawStroke(e) {
      const canvas = noteDrawState.activeCanvas;
      if (!noteDrawState.drawing || canvas !== e.currentTarget || !noteDrawState.lastPoint) return;
      e.preventDefault();
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      const p = notePoint(e, canvas);
      ctx.save();
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = 1;
      ctx.strokeStyle = noteDrawState.color || '#d93025';
      ctx.lineWidth = noteDrawState.size || 3;
      const mid = { x: (noteDrawState.lastPoint.x + p.x) / 2, y: (noteDrawState.lastPoint.y + p.y) / 2 };
      ctx.beginPath();
      ctx.moveTo(noteDrawState.lastPoint.x, noteDrawState.lastPoint.y);
      ctx.quadraticCurveTo(noteDrawState.lastPoint.x, noteDrawState.lastPoint.y, mid.x, mid.y);
      ctx.stroke();
      ctx.restore();
      noteDrawState.lastPoint = p;
    }

    function endNoteDrawStroke(e) {
      if (!noteDrawState.drawing) return;
      e?.preventDefault?.();
      const canvas = noteDrawState.activeCanvas;
      noteDrawState.drawing = false;
      noteDrawState.lastPoint = null;
      if (canvas) saveNoteDrawDataFromCanvas(canvas);
    }

    function handwriteCanvasIsBlankWhite() {
      if (!handwriteCanvas || !handwriteCtx) return true;
      const data = handwriteCtx.getImageData(0, 0, handwriteCanvas.width, handwriteCanvas.height).data;
      for (let i = 0; i < data.length; i += 16) {
        const r = data[i], g = data[i + 1], b = data[i + 2], a = data[i + 3];
        if (a > 5 && !(r > 246 && g > 246 && b > 246)) return false;
      }
      return true;
    }

    function deleteHandwriteEditImage() {
      if (!handwriteEditImage) return false;
      const wrap = handwriteEditImage.closest('.resizable-img-wrap');
      if (wrap) wrap.remove();
      handwriteEditImage = null;
      selectedHanddrawWrap = null;
      syncRichEditors();
      toast('펜메모 삭제 완료');
      closeHandwritePad();
      return true;
    }

    function selectHanddrawWrap(wrap) {
      document.querySelectorAll('.selected-handdraw').forEach(el => el.classList.remove('selected-handdraw'));
      selectedHanddrawWrap = wrap || null;
      if (selectedHanddrawWrap) selectedHanddrawWrap.classList.add('selected-handdraw');
    }

    function syncRichEditors() {
      const note = document.getElementById('noteText');
      if (note && note.dataset.action === 'rich-note') {
        const r = ensureRecord(selectedDate);
        r.noteHtml = cleanHtml(note.innerHTML);
        r.noteText = note.innerText || '';
        saveVisibleNoteDrawData(selectedDate);
        saveApp();
      }
      document.querySelectorAll('[data-action="task-rich-text"]').forEach(el => syncTodayTaskEditor(el));
      document.querySelectorAll('[data-action="watch-rich-name"], [data-action="watch-rich-reason"]').forEach(el => syncTodayWatchEditor(el));
    }

    function getCurrentRichEditor() {
      const active = document.activeElement && document.activeElement.closest ? document.activeElement.closest('.rich-editor[contenteditable="true"]') : null;
      if (active) return active;
      if (savedSelectionRange) return editableRootFromRange(savedSelectionRange);
      return null;
    }

    function insertHtmlIntoRichEditor(html) {
      const editor = getCurrentRichEditor();
      if (!editor) {
        alert('노트, 추가노트, 메모 입력칸에 커서를 둔 뒤 사용해 주세요.');
        return false;
      }
      editor.focus();
      restoreSavedSelection();
      const sel = window.getSelection();
      if (!sel || !sel.rangeCount || !editableRootFromRange(sel.getRangeAt(0))) {
        const range = document.createRange();
        range.selectNodeContents(editor);
        range.collapse(false);
        sel.removeAllRanges();
        sel.addRange(range);
      }
      document.execCommand('insertHTML', false, html);
      syncRichEditors();
      return true;
    }

    function sanitizeLinkUrl(url) {
      const trimmed = String(url || '').trim();
      if (!trimmed) return '';
      if (/^(https?:|mailto:|tel:)/i.test(trimmed)) return trimmed;
      if (/^[\w.-]+\.[A-Za-z]{2,}/.test(trimmed)) return `https://${trimmed}`;
      alert('http, https, mailto, tel 링크만 사용할 수 있습니다.');
      return '';
    }

    function insertRichLink() {
      const url = sanitizeLinkUrl(prompt('연결할 링크 주소를 입력하세요. 예: https://example.com') || '');
      if (!url) return;
      restoreSavedSelection();
      const sel = window.getSelection();
      const hasSelection = sel && sel.rangeCount && !sel.isCollapsed && editableRootFromRange(sel.getRangeAt(0));
      if (hasSelection) {
        document.execCommand('createLink', false, url);
        syncRichEditors();
      } else {
        const text = prompt('표시할 글자를 입력하세요.', url) || url;
        insertHtmlIntoRichEditor(`<a href="${esc(url)}" target="_blank" rel="noopener noreferrer">${esc(text)}</a>`);
      }
    }

    function insertRichImageFile(file) {
      if (!file) return;
      if (!/^image\//.test(file.type)) { alert('이미지 파일만 삽입할 수 있습니다.'); return; }
      if (file.size > 1800000) {
        const ok = confirm('이미지 파일이 커서 브라우저 저장공간을 많이 사용할 수 있습니다. 그래도 삽입할까요?');
        if (!ok) return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        const alt = esc(file.name || '삽입 이미지');
        insertHtmlIntoRichEditor(`<span class="resizable-img-wrap" contenteditable="false" style="width:260px;height:180px;"><img src="${String(reader.result)}" alt="${alt}"></span>&nbsp;`);
      };
      reader.onerror = () => alert('이미지 파일을 읽지 못했습니다.');
      reader.readAsDataURL(file);
    }

    function initHandwriteCanvas() {
      if (!handwriteCanvas) return;
      handwriteCtx = handwriteCanvas.getContext('2d', { willReadFrequently: true });
      handwriteCtx.lineCap = 'round';
      handwriteCtx.lineJoin = 'round';
      handwriteCanvas.onpointerdown = startHandwriteStroke;
      handwriteCanvas.onpointermove = moveHandwriteStroke;
      handwriteCanvas.onpointerup = endHandwriteStroke;
      handwriteCanvas.onpointercancel = endHandwriteStroke;
      handwriteCanvas.onpointerleave = endHandwriteStroke;
    }

    function clearHandwriteCanvas(fill = true) {
      if (!handwriteCtx) initHandwriteCanvas();
      if (!handwriteCtx) return;
      handwriteCtx.clearRect(0, 0, handwriteCanvas.width, handwriteCanvas.height);
      if (fill) {
        handwriteCtx.save();
        handwriteCtx.fillStyle = '#ffffff';
        handwriteCtx.fillRect(0, 0, handwriteCanvas.width, handwriteCanvas.height);
        handwriteCtx.restore();
      }
    }

    function openHandwritePad(editImage = null) {
      if (!editImage && !getCurrentRichEditor()) {
        alert('노트나 메모 기록창에 커서를 둔 뒤 펜메모를 눌러주세요.');
        return;
      }
      handwriteEditImage = editImage || null;
      if (!handwriteCtx) initHandwriteCanvas();
      clearHandwriteCanvas(true);
      handwriteUndoStack = [];
      const penColor = document.getElementById('handwriteColor');
      const highlightColor = document.getElementById('handwriteHighlightColor');
      const sizeEl = document.getElementById('handwriteSize');
      if (penColor && !penColor.value) penColor.value = '#d93025';
      if (highlightColor && !highlightColor.value) highlightColor.value = '#fff176';
      if (sizeEl && !sizeEl.value) sizeEl.value = '5';
      setHandwriteMode('pen');
      handwriteBackdrop?.classList.toggle('editing', !!editImage);
      handwriteBackdrop?.classList.add('open');
      if (editImage && editImage.src) {
        const img = new Image();
        img.onload = () => {
          clearHandwriteCanvas(true);
          const scale = Math.min(handwriteCanvas.width / img.width, handwriteCanvas.height / img.height);
          const w = img.width * scale;
          const h = img.height * scale;
          const x = (handwriteCanvas.width - w) / 2;
          const y = (handwriteCanvas.height - h) / 2;
          handwriteCtx.drawImage(img, x, y, w, h);
          pushHandwriteUndo();
        };
        img.src = editImage.src;
      } else {
        pushHandwriteUndo();
      }
    }

    function closeHandwritePad() {
      handwriteDrawing = false;
      handwriteLastPoint = null;
      handwriteBackdrop?.classList.remove('open');
      handwriteBackdrop?.classList.remove('editing');
      handwriteEditImage = null;
    }

    function setHandwriteMode(mode) {
      handwriteMode = mode || 'pen';
      const penColor = document.getElementById('handwriteColor');
      const highlightColor = document.getElementById('handwriteHighlightColor');
      const sizeEl = document.getElementById('handwriteSize');
      if (penColor && !penColor.value) penColor.value = '#d93025';
      if (highlightColor && !highlightColor.value) highlightColor.value = '#fff176';
      if (sizeEl) {
        if (handwriteMode === 'highlighter' && Number(sizeEl.value || 0) < 10) sizeEl.value = '14';
        if (handwriteMode === 'pen' && Number(sizeEl.value || 0) > 12) sizeEl.value = '5';
        if (handwriteMode === 'eraser' && Number(sizeEl.value || 0) < 12) sizeEl.value = '18';
      }
      document.querySelectorAll('[data-action="handwrite-mode"]').forEach(btn => btn.classList.toggle('active', btn.dataset.mode === handwriteMode));
    }

    function pushHandwriteUndo() {
      if (!handwriteCanvas) return;
      try {
        handwriteUndoStack.push(handwriteCanvas.toDataURL('image/png'));
        if (handwriteUndoStack.length > 25) handwriteUndoStack.shift();
      } catch (e) { console.warn(e); }
    }

    function undoHandwrite() {
      if (!handwriteCtx || handwriteUndoStack.length <= 1) return;
      handwriteUndoStack.pop();
      const src = handwriteUndoStack[handwriteUndoStack.length - 1];
      const img = new Image();
      img.onload = () => { clearHandwriteCanvas(false); handwriteCtx.drawImage(img, 0, 0, handwriteCanvas.width, handwriteCanvas.height); };
      img.src = src;
    }

    function pointOnHandwriteCanvas(e) {
      const rect = handwriteCanvas.getBoundingClientRect();
      return {
        x: (e.clientX - rect.left) * (handwriteCanvas.width / rect.width),
        y: (e.clientY - rect.top) * (handwriteCanvas.height / rect.height)
      };
    }

    function startHandwriteStroke(e) {
      e.preventDefault();
      if (!handwriteCtx) initHandwriteCanvas();
      handwriteDrawing = true;
      handwriteLastPoint = pointOnHandwriteCanvas(e);
      handwriteCanvas.setPointerCapture?.(e.pointerId);
      pushHandwriteUndo();
    }

    function moveHandwriteStroke(e) {
      if (!handwriteDrawing || !handwriteCtx || !handwriteLastPoint) return;
      e.preventDefault();
      const p = pointOnHandwriteCanvas(e);
      const colorEl = document.getElementById('handwriteColor');
      const highlightColorEl = document.getElementById('handwriteHighlightColor');
      const sizeEl = document.getElementById('handwriteSize');
      const pressure = e.pressure && e.pressure > 0 ? e.pressure : 0.55;
      const size = Math.max(1, Number(sizeEl?.value || 5)) * (0.72 + pressure * 0.45);
      handwriteCtx.save();
      if (handwriteMode === 'eraser') {
        handwriteCtx.globalCompositeOperation = 'destination-out';
        handwriteCtx.strokeStyle = 'rgba(0,0,0,1)';
        handwriteCtx.lineWidth = size * 1.8;
      } else if (handwriteMode === 'highlighter') {
        handwriteCtx.globalCompositeOperation = 'multiply';
        handwriteCtx.globalAlpha = .32;
        handwriteCtx.strokeStyle = highlightColorEl?.value || '#fff176';
        handwriteCtx.lineWidth = size * 2.8;
      } else {
        handwriteCtx.globalCompositeOperation = 'source-over';
        handwriteCtx.globalAlpha = 1;
        handwriteCtx.strokeStyle = colorEl?.value || '#d93025';
        handwriteCtx.lineWidth = size;
      }
      const mid = { x: (handwriteLastPoint.x + p.x) / 2, y: (handwriteLastPoint.y + p.y) / 2 };
      handwriteCtx.beginPath();
      handwriteCtx.moveTo(handwriteLastPoint.x, handwriteLastPoint.y);
      handwriteCtx.quadraticCurveTo(handwriteLastPoint.x, handwriteLastPoint.y, mid.x, mid.y);
      handwriteCtx.stroke();
      handwriteCtx.restore();
      handwriteLastPoint = p;
    }

      });
    }
  })();
  
  </script>
