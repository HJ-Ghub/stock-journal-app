  <script>

  (() => {
    'use strict';

    const ACCOUNTS = ['기본계좌', '스윙계좌', '단타계좌'];
    const STORAGE_KEY = 'stockDiaryMiniApp.v1';
    const SETTINGS_KEY = 'stockDiaryMiniApp.settings.v1';
    const DB_NAME = 'stockDiaryMiniApp.indexeddb.v1';
    const DB_VERSION = 1;
    const DB_STORE = 'kv';
    const DB_APP_KEY = 'app';
    const CLOUD_SETTINGS_KEY = 'stockDiaryMiniApp.cloudSettings.v1';
    const DEFAULT_OP1 = '기타';
    const DEFAULT_OP2 = '기타';
    const OP1_LIST = ['홀딩', '추매', '매수', '매도', '일부매도', '관망', '기타'];
    const OP2_LIST = ['장기', '중기', '단기', '홀딩', '추매', '매도', '일부매도', '관망', '기타'];
    const CLASS_TAGS = [
      { value: '', label: '', name: '미지정' },
      { value: 'red', label: '빨', name: '빨강' },
      { value: 'orange', label: '주', name: '주황' },
      { value: 'orange2', label: '오', name: '오렌지' },
      { value: 'yellow', label: '노', name: '노랑' },
      { value: 'green', label: '초', name: '초록' },
      { value: 'blue', label: '파', name: '파랑' },
      { value: 'navy', label: '남', name: '남색' },
      { value: 'purple', label: '보', name: '보라' },
      { value: 'gray', label: '회', name: '회색' }
    ];
    const TARGET_COLORS = [
      { value: 'black', label: '검', css: '#111827', name: '검정' },
      { value: 'blue', label: '파', css: '#1769d1', name: '파랑' },
      { value: 'red', label: '빨', css: '#d93025', name: '빨강' }
    ];
    const DAY_NAMES = ['일', '월', '화', '수', '목', '금', '토'];
    const WEATHER = ['☀️ 맑음', '⛅ 구름', '🌧️ 비', '❄️ 눈', '🌫️ 흐림', '🌬️ 바람'];
    const MOODS = ['😊 차분', '😄 좋음', '😐 보통', '😟 불안', '😣 피곤', '🔥 집중'];

    let app = emptyApp();
    let dbPromise = null;
    let saveTimer = null;
    let saveInFlight = Promise.resolve();
    let cloudState = { client: null, user: null, saveTimer: null, lastSyncAt: '', lastError: '' };
    let currentTab = 'today';
    let selectedDate = toYmd(new Date());
    let accountUploadDate = selectedDate;
    let sortState = {
      performance: { key: 'profitSum', dir: 'desc' },
      latest: { key: 'date', dir: 'desc' },
      stocks: { key: 'recentDate', dir: 'desc' }
    };
    let todayUploadState = {};
    let performanceFilterState = { account: '전체계좌', search: '' };
    let latestFilterState = { account: '전체계좌', status: '전체', search: '' };
    let stockFilterState = { account: '전체계좌', search: '' };
    let searchRenderTimer = null;
    let dailyHistoryState = { watchSearch: '', noteSearch: '', watchSortKey: 'date', watchDir: 'desc', noteSortKey: 'date', noteDir: 'desc' };
    let memoHistoryState = { account: '전체계좌', search: '', sortKey: 'date', dir: 'desc' };
    let isComposingSearchText = false;
    let savedSelectionRange = null;
    let modalMemoContext = null;
    let modalDetailMainContext = null;

    const root = document.getElementById('appRoot');
    const modalBackdrop = document.getElementById('modalBackdrop');
    const modalContent = document.getElementById('modalContent');
    const handwriteBackdrop = document.getElementById('handwriteBackdrop');
    const handwriteCanvas = document.getElementById('handwriteCanvas');
    const toastEl = document.getElementById('toast');
    let handwriteCtx = null;
    let handwriteMode = 'pen';
    let handwriteDrawing = false;
    let handwriteLastPoint = null;
    let handwriteUndoStack = [];
    let handwriteEditImage = null;
    let selectedHanddrawWrap = null;
    let noteDrawState = { activeCanvas: null, drawing: false, lastPoint: null, color: '#d93025', size: 3 };
    let pendingTodayFocus = null;

    function defaultUiStyle() {
      return {
        fontFamily: 'system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif',
        fontSize: '15px',
        textColor: '#273447',
        highlightColor: '#fff3a3'
      };
    }

    function emptyApp() {
      return {
        records: {},
        trades: [],
        balances: [],
        memos: {},
        memoHtml: {},
        opinionHistory: {},
        opinion1: {},
        opinion2: {},
        watchExtras: [],
        noteExtras: [],
        memoDetails: {},
        memoManuals: [],
        dailyDetailExtras: {},
        memoFieldExtras: {},
        dailyHistoryChecks: {},
        classTags: {},
        accounts: defaultAccounts(),
        deletedAccountOrigins: [],
        customFonts: [],
        formatRecents: [],
        uiStyle: defaultUiStyle()
      };
    }

    function normalizeTodayTaskList(list) {
      if (!Array.isArray(list)) return [];
      return list.map(item => {
        if (typeof item === 'string') {
          return { done: false, text: item, textHtml: escMultiline(item) };
        }
        if (!item || typeof item !== 'object') return { done: false, text: '', textHtml: '' };
        const text = String(item.text ?? item.title ?? item.value ?? '');
        const textHtml = String(item.textHtml || item.html || (text ? escMultiline(text) : ''));
        return Object.assign({}, item, { done: Boolean(item.done), text, textHtml });
      });
    }

    function normalizeTodayWatchList(list) {
      if (!Array.isArray(list)) return [];
      return list.map(item => {
        if (typeof item === 'string') {
          return { name: item, nameHtml: escMultiline(item), reason: '', reasonHtml: '' };
        }
        if (!item || typeof item !== 'object') return { name: '', nameHtml: '', reason: '', reasonHtml: '' };
        const name = String(item.name ?? item.stockName ?? item.title ?? '');
        const reason = String(item.reason ?? item.memo ?? item.text ?? '');
        const nameHtml = String(item.nameHtml || (name ? escMultiline(name) : ''));
        const reasonHtml = String(item.reasonHtml || item.html || (reason ? escMultiline(reason) : ''));
        return Object.assign({}, item, { name, nameHtml, reason, reasonHtml });
      });
    }

    function normalizeTodayRecord(record, dateKey = '') {
      const r = record && typeof record === 'object' ? record : {};
      const date = r.date || dateKey || selectedDate || toYmd(new Date());
      r.date = date;
      r.weather = r.weather || WEATHER[0];
      r.mood = r.mood || MOODS[0];
      r.prep = normalizeTodayTaskList(r.prep);
      r.todo = normalizeTodayTaskList(r.todo);
      r.routine = normalizeTodayTaskList(r.routine);
      r.watch = normalizeTodayWatchList(r.watch);
      r.noteHtml = String(r.noteHtml || '');
      r.noteText = String(r.noteText || plainFromHtml(r.noteHtml || ''));
      r.noteDrawData = String(r.noteDrawData || '');
      return r;
    }

    function normalizeRecordsForCompatibility(records) {
      const out = {};
      const src = records && typeof records === 'object' ? records : {};
      Object.keys(src).forEach(date => {
        out[date] = normalizeTodayRecord(src[date], date);
      });
      return out;
    }

    function recordHasMeaningfulEntries(record) {
      const r = record && typeof record === 'object' ? record : {};
      return (Array.isArray(r.prep) && r.prep.length > 0)
        || (Array.isArray(r.todo) && r.todo.length > 0)
        || (Array.isArray(r.routine) && r.routine.length > 0)
        || (Array.isArray(r.watch) && r.watch.length > 0)
        || String(r.noteHtml || '').trim().length > 0
        || String(r.noteText || '').trim().length > 0
        || String(r.noteDrawData || '').trim().length > 0;
    }

    function isMeaningfulAppData(candidate) {
      const data = candidate && typeof candidate === 'object' ? candidate : {};
      const records = data.records && typeof data.records === 'object' ? data.records : {};
      const meaningfulRecordCount = Object.keys(records).filter(date => recordHasMeaningfulEntries(records[date])).length;
      return meaningfulRecordCount > 0
        || (Array.isArray(data.trades) && data.trades.length > 0)
        || (Array.isArray(data.balances) && data.balances.length > 0)
        || (data.memos && typeof data.memos === 'object' && Object.keys(data.memos).length > 0)
        || (data.memoHtml && typeof data.memoHtml === 'object' && Object.keys(data.memoHtml).length > 0)
        || (Array.isArray(data.watchExtras) && data.watchExtras.length > 0)
        || (Array.isArray(data.noteExtras) && data.noteExtras.length > 0)
        || (Array.isArray(data.memoManuals) && data.memoManuals.length > 0);
    }

    function normalizeLoadedApp(parsed) {
      parsed = parsed && typeof parsed === 'object' ? parsed : {};
      return Object.assign(emptyApp(), parsed, {
        records: normalizeRecordsForCompatibility(parsed.records || {}),
        trades: Array.isArray(parsed.trades) ? parsed.trades : [],
        balances: Array.isArray(parsed.balances) ? parsed.balances : [],
        memos: parsed.memos || {},
        memoHtml: parsed.memoHtml || {},
        opinionHistory: parsed.opinionHistory || {},
        opinion1: parsed.opinion1 || {},
        opinion2: parsed.opinion2 || {},
        watchExtras: Array.isArray(parsed.watchExtras) ? parsed.watchExtras : [],
        noteExtras: Array.isArray(parsed.noteExtras) ? parsed.noteExtras : [],
        memoDetails: parsed.memoDetails || {},
        memoManuals: Array.isArray(parsed.memoManuals) ? parsed.memoManuals : [],
        dailyDetailExtras: parsed.dailyDetailExtras || {},
        memoFieldExtras: parsed.memoFieldExtras || {},
        dailyHistoryChecks: parsed.dailyHistoryChecks || {},
        classTags: parsed.classTags || {},
        accounts: Array.isArray(parsed.accounts) ? parsed.accounts : defaultAccounts(),
        deletedAccountOrigins: Array.isArray(parsed.deletedAccountOrigins) ? parsed.deletedAccountOrigins : [],
        customFonts: Array.isArray(parsed.customFonts) ? parsed.customFonts : [],
        formatRecents: Array.isArray(parsed.formatRecents) ? parsed.formatRecents : [],
        uiStyle: Object.assign(defaultUiStyle(), parsed.uiStyle || {})
      });
    }

    function openDb() {
      if (dbPromise) return dbPromise;
      dbPromise = new Promise((resolve, reject) => {
        if (!('indexedDB' in window)) {
          reject(new Error('IndexedDB를 사용할 수 없는 브라우저입니다.'));
          return;
        }
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains(DB_STORE)) db.createObjectStore(DB_STORE);
          if (!db.objectStoreNames.contains('assets')) db.createObjectStore('assets');
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error || new Error('IndexedDB 열기 실패'));
        req.onblocked = () => reject(new Error('IndexedDB 업데이트가 다른 탭에 의해 막혔습니다. 앱을 연 다른 탭을 닫고 다시 시도해 주세요.'));
      });
      return dbPromise;
    }

    async function idbGet(key) {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(DB_STORE, 'readonly');
        const req = tx.objectStore(DB_STORE).get(key);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error || new Error('IndexedDB 읽기 실패'));
        tx.onerror = () => reject(tx.error || new Error('IndexedDB 읽기 트랜잭션 실패'));
      });
    }

    async function idbPut(key, value) {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(DB_STORE, 'readwrite');
        tx.objectStore(DB_STORE).put(value, key);
        tx.oncomplete = () => resolve(true);
        tx.onerror = () => reject(tx.error || new Error('IndexedDB 저장 실패'));
        tx.onabort = () => reject(tx.error || new Error('IndexedDB 저장이 중단되었습니다.'));
      });
    }

    function loadSmallSettings() {
      try {
        const raw = localStorage.getItem(SETTINGS_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch (e) {
        console.warn(e);
        return {};
      }
    }

    function saveSmallSettings() {
      try {
        localStorage.setItem(SETTINGS_KEY, JSON.stringify({
          selectedDate,
          accountUploadDate,
          currentTab,
          uiStyle: app && app.uiStyle ? app.uiStyle : defaultUiStyle(),
          performanceFilterState,
          latestFilterState,
          stockFilterState,
          dailyHistoryState,
          memoHistoryState
        }));
      } catch (e) {
        console.warn('작은 설정값 저장 실패', e);
      }
    }

    function cleanupLargeLocalStorage() {
      // 이전 기록 복구 가능성을 위해 기존 localStorage 백업은 자동 삭제하지 않습니다.
      // IndexedDB 저장 실패를 막기 위한 정리는 사용자가 전체 초기화를 선택했을 때만 수행합니다.
      return true;
    }

    function classifyStorageError(err) {
      const name = String(err && err.name || '');
      const message = String(err && err.message || err || '');
      if (/QuotaExceeded|NS_ERROR_DOM_QUOTA_REACHED|저장공간|quota/i.test(name + ' ' + message)) {
        return '저장 실패 원인: 저장공간 부족\nIndexedDB 저장공간이 부족합니다. Safari/Chrome의 사이트 데이터 공간을 확보하거나, 너무 큰 이미지·손글씨 그림을 줄여 주세요.';
      }
      return `저장 실패 원인: IndexedDB 오류
${message || '알 수 없는 IndexedDB 오류입니다.'}`;
    }

    function showStorageError(err) {
      const msg = classifyStorageError(err);
      console.error(err);
      toast(msg.split('\n')[0]);
      clearTimeout(showStorageError._timer);
      showStorageError._timer = setTimeout(() => alert(msg), 50);
    }


    function loadCloudSettings() {
      try {
        const raw = localStorage.getItem(CLOUD_SETTINGS_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch (e) {
        console.warn(e);
        return {};
      }
    }

    function saveCloudSettings(settings) {
      try {
        localStorage.setItem(CLOUD_SETTINGS_KEY, JSON.stringify({
          url: String(settings.url || '').trim(),
          anonKey: String(settings.anonKey || '').trim(),
          email: String(settings.email || '').trim(),
          password: String(settings.password || '')
        }));
      } catch (e) {
        console.warn('클라우드 설정 저장 실패', e);
      }
    }

    function fillCloudSettingsForm() {
      const s = loadCloudSettings();
      const url = document.getElementById('cloudSupabaseUrl');
      const key = document.getElementById('cloudSupabaseAnonKey');
      const email = document.getElementById('cloudEmail');
      const password = document.getElementById('cloudPassword');
      if (url && !url.value) url.value = s.url || '';
      if (key && !key.value) key.value = s.anonKey || '';
      if (email && !email.value) email.value = s.email || '';
      if (password && !password.value) password.value = s.password || '';
      updateCloudStatus();
    }

    function readCloudForm() {
      return {
        url: document.getElementById('cloudSupabaseUrl')?.value || '',
        anonKey: document.getElementById('cloudSupabaseAnonKey')?.value || '',
        email: document.getElementById('cloudEmail')?.value || '',
        password: document.getElementById('cloudPassword')?.value || ''
      };
    }

    function runCloudActionDirect(action) {
      let job = null;
      if (action === 'cloud-save-config') job = cloudSaveConfig();
      else if (action === 'cloud-signup') job = cloudSignUp();
      else if (action === 'cloud-login') job = cloudLogin();
      else if (action === 'cloud-sync-now') job = cloudSyncNow();
      else if (action === 'cloud-logout') job = cloudLogout();
      if (job && typeof job.catch === 'function') {
        job.catch(err => {
          console.error(err);
          updateCloudStatus('클라우드 버튼 실행 오류', 'err');
          alert('클라우드 버튼 실행 오류: ' + (err && err.message ? err.message : err));
        });
      }
    }

    function bindCloudButtonsDirectly() {
      document.querySelectorAll('.cloud-sync-panel [data-action^="cloud-"]').forEach(btn => {
        if (btn.dataset.cloudDirectBound === '1') return;
        btn.dataset.cloudDirectBound = '1';
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          runCloudActionDirect(btn.dataset.action);
        }, true);
      });
    }

    function updateCloudStatus(message, type) {
      const el = document.getElementById('cloudStatus');
      if (!el) return;
      el.classList.remove('ok','warn','err');
      if (type) el.classList.add(type);
      else if (cloudState.user) el.classList.add('ok');
      else if (loadCloudSettings().url) el.classList.add('warn');
      else el.classList.add('warn');
      if (message) {
        el.textContent = message;
      } else if (cloudState.user) {
        el.textContent = `클라우드 로그인됨: ${cloudState.user.email || ''}${cloudState.lastSyncAt ? ' · 마지막 동기화 ' + cloudState.lastSyncAt : ''}`;
      } else if (loadCloudSettings().url) {
        el.textContent = '클라우드 설정됨 · 로그인 필요';
      } else {
        el.textContent = '클라우드 미설정 · 이 기기에만 저장 중';
      }
    }

    function initCloudClient() {
      const s = loadCloudSettings();
      if (!s.url || !s.anonKey || !window.supabase || !window.supabase.createClient) {
        cloudState.client = null;
        return null;
      }
      if (cloudState.client && cloudState._url === s.url && cloudState._anonKey === s.anonKey) return cloudState.client;
      cloudState.client = window.supabase.createClient(s.url, s.anonKey, {
        auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
      });
      cloudState._url = s.url;
      cloudState._anonKey = s.anonKey;
      cloudState.client.auth.onAuthStateChange((_event, session) => {
        cloudState.user = session?.user || null;
        updateCloudStatus();
      });
      return cloudState.client;
    }

    async function restoreCloudSession() {
      const client = initCloudClient();
      if (!client) { updateCloudStatus(); return; }
      try {
        const { data, error } = await client.auth.getSession();
        if (error) throw error;
        cloudState.user = data?.session?.user || null;
        updateCloudStatus();
      } catch (e) {
        cloudState.lastError = e.message || String(e);
        updateCloudStatus('클라우드 세션 확인 실패', 'err');
      }
    }

    async function cloudSaveConfig() {
      const form = readCloudForm();
      if (!form.url || !form.anonKey) { alert('Supabase URL과 anon key를 입력해 주세요.'); return; }
      saveCloudSettings(form);
      initCloudClient();
      await restoreCloudSession();
      toast('클라우드 설정 저장 완료');
      updateCloudStatus();
    }

    async function cloudSignUp() {
      await cloudSaveConfig();
      const client = initCloudClient();
      const form = readCloudForm();
      if (!client || !form.email || !form.password) { alert('이메일과 비밀번호를 입력해 주세요.'); return; }
      try {
        updateCloudStatus('가입 처리 중...', 'warn');
        const { data, error } = await client.auth.signUp({ email: form.email, password: form.password });
        if (error) throw error;
        cloudState.user = data?.user || data?.session?.user || null;
        updateCloudStatus('가입 완료 · 이메일 확인이 필요할 수 있습니다.', 'ok');
        toast('가입 완료');
      } catch (e) {
        updateCloudStatus('가입 실패', 'err');
        alert('가입 실패: ' + (e.message || e));
      }
    }

    async function cloudLogin() {
      await cloudSaveConfig();
      const client = initCloudClient();
      const form = readCloudForm();
      if (!client || !form.email || !form.password) { alert('이메일과 비밀번호를 입력해 주세요.'); return; }
      try {
        updateCloudStatus('로그인 중...', 'warn');
        const { data, error } = await client.auth.signInWithPassword({ email: form.email, password: form.password });
        if (error) throw error;
        cloudState.user = data?.user || data?.session?.user || null;
        updateCloudStatus('로그인 완료', 'ok');
        toast('클라우드 로그인 완료');
      } catch (e) {
        updateCloudStatus('로그인 실패', 'err');
        alert('로그인 실패: ' + (e.message || e));
      }
    }

    async function cloudLogout() {
      const client = initCloudClient();
      if (!client) return;
      try {
        await client.auth.signOut();
      } catch (e) { console.warn(e); }
      cloudState.user = null;
      updateCloudStatus('로그아웃됨 · 이 기기에만 저장 중', 'warn');
    }

    async function cloudFetchRemote() {
      const client = initCloudClient();
      if (!client || !cloudState.user) return null;
      const { data, error } = await client
        .from('stock_app_state')
        .select('data, updated_at')
        .eq('user_id', cloudState.user.id)
        .maybeSingle();
      if (error) throw error;
      return data || null;
    }

    async function cloudSaveNow(snapshot = app) {
      const client = initCloudClient();
      if (!client || !cloudState.user) return false;
      const payload = normalizeLoadedApp(snapshot);
      const { error } = await client
        .from('stock_app_state')
        .upsert({ user_id: cloudState.user.id, data: payload, updated_at: new Date().toISOString() }, { onConflict: 'user_id' });
      if (error) throw error;
      cloudState.lastSyncAt = new Date().toLocaleString('ko-KR');
      updateCloudStatus();
      return true;
    }

    function cloudQueueSave(snapshot = app) {
      if (!cloudState.user || !cloudState.client) return Promise.resolve(false);
      clearTimeout(cloudState.saveTimer);
      cloudState.saveTimer = setTimeout(() => {
        cloudSaveNow(snapshot).catch(e => {
          console.error(e);
          cloudState.lastError = e.message || String(e);
          updateCloudStatus('클라우드 저장 실패 · 로컬에는 저장됨', 'err');
        });
      }, 900);
      return Promise.resolve(true);
    }

    async function cloudSyncNow() {
      const client = initCloudClient();
      if (!client) { alert('먼저 Supabase URL과 anon key를 입력하고 설정저장을 눌러 주세요.'); return; }
      if (!cloudState.user) { alert('먼저 클라우드 로그인을 해 주세요.'); return; }
      try {
        updateCloudStatus('클라우드 확인 중...', 'warn');
        const remote = await cloudFetchRemote();
        if (!remote || !remote.data) {
          await cloudSaveNow(app);
          toast('현재 기기 데이터를 클라우드에 처음 저장했습니다.');
          return;
        }
        const loadRemote = confirm('클라우드에 저장된 데이터가 있습니다.\n\n[확인] 클라우드 데이터를 이 기기로 불러오기\n[취소] 현재 기기 데이터를 클라우드에 올리기');
        if (loadRemote) {
          app = normalizeLoadedApp(remote.data);
          await idbPut(DB_APP_KEY, app);
          cleanupLargeLocalStorage();
          normalizeAccounts();
          render();
          cloudState.lastSyncAt = new Date().toLocaleString('ko-KR');
          updateCloudStatus('클라우드 데이터 불러오기 완료', 'ok');
          toast('클라우드 데이터 불러오기 완료');
        } else {
          await cloudSaveNow(app);
          toast('현재 기기 데이터를 클라우드에 저장했습니다.');
        }
      } catch (e) {
        console.error(e);
        updateCloudStatus('클라우드 동기화 실패', 'err');
        alert('클라우드 동기화 실패: ' + (e.message || e));
      }
    }

    function readLegacyAppFromLocalStorage() {
      try {
        const candidates = [];
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (!key) continue;
          if (key === STORAGE_KEY || /stockDiaryMiniApp|FULL_BACKUP|PATCHED_SAVE|BACKUP/i.test(key)) {
            const raw = localStorage.getItem(key);
            if (!raw || raw.length < 10) continue;
            try {
              const parsed = JSON.parse(raw);
              if (isMeaningfulAppData(parsed)) candidates.push({ key, data: parsed, length: raw.length });
            } catch (err) { /* 해당 키는 앱 데이터가 아닐 수 있습니다. */ }
          }
        }
        candidates.sort((a, b) => b.length - a.length);
        return candidates[0] || null;
      } catch (e) {
        console.warn('이전 localStorage 기록 확인 실패', e);
        return null;
      }
    }


    function uniqueByJson(list) {
      const seen = new Set();
      return (Array.isArray(list) ? list : []).filter(item => {
        const key = JSON.stringify(item || {});
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function mergeTodayTaskLists(current, recovered) {
      const cur = normalizeTodayTaskList(current || []);
      const old = normalizeTodayTaskList(recovered || []);
      const seen = new Set(cur.map(item => normalizeText(`${item.text || ''} ${plainFromHtml(item.textHtml || '')}`)));
      old.forEach(item => {
        const key = normalizeText(`${item.text || ''} ${plainFromHtml(item.textHtml || '')}`);
        if (key && !seen.has(key)) {
          cur.push(item);
          seen.add(key);
        }
      });
      return cur;
    }

    function mergeTodayWatchLists(current, recovered) {
      const cur = normalizeTodayWatchList(current || []);
      const old = normalizeTodayWatchList(recovered || []);
      const seen = new Set(cur.map(item => normalizeText(`${item.name || ''} ${item.reason || ''} ${plainFromHtml(item.nameHtml || '')} ${plainFromHtml(item.reasonHtml || '')}`)));
      old.forEach(item => {
        const key = normalizeText(`${item.name || ''} ${item.reason || ''} ${plainFromHtml(item.nameHtml || '')} ${plainFromHtml(item.reasonHtml || '')}`);
        if (key && !seen.has(key)) {
          cur.push(item);
          seen.add(key);
        }
      });
      return cur;
    }

    function mergeRecoveredApp(currentApp, recoveredApp) {
      const cur = normalizeLoadedApp(currentApp || {});
      const old = normalizeLoadedApp(recoveredApp || {});
      Object.keys(old.records || {}).forEach(date => {
        const oldRec = normalizeTodayRecord(old.records[date], date);
        const curRec = cur.records[date] ? normalizeTodayRecord(cur.records[date], date) : normalizeTodayRecord({}, date);
        curRec.weather = curRec.weather || oldRec.weather || WEATHER[0];
        curRec.mood = curRec.mood || oldRec.mood || MOODS[0];
        curRec.prep = mergeTodayTaskLists(curRec.prep, oldRec.prep);
        curRec.todo = mergeTodayTaskLists(curRec.todo, oldRec.todo);
        curRec.routine = mergeTodayTaskLists(curRec.routine, oldRec.routine);
        curRec.watch = mergeTodayWatchLists(curRec.watch, oldRec.watch);
        if (!String(curRec.noteHtml || curRec.noteText || '').trim() && String(oldRec.noteHtml || oldRec.noteText || '').trim()) {
          curRec.noteHtml = oldRec.noteHtml;
          curRec.noteText = oldRec.noteText;
        }
        if (!String(curRec.noteDrawData || '').trim() && String(oldRec.noteDrawData || '').trim()) {
          curRec.noteDrawData = oldRec.noteDrawData;
        }
        cur.records[date] = curRec;
      });
      ['trades','balances','watchExtras','noteExtras','memoManuals','customFonts','formatRecents','accounts','deletedAccountOrigins'].forEach(key => {
        cur[key] = uniqueByJson([...(old[key] || []), ...(cur[key] || [])]);
      });
      ['memos','memoHtml','opinionHistory','opinion1','opinion2','memoDetails','dailyDetailExtras','memoFieldExtras','dailyHistoryChecks','classTags'].forEach(key => {
        cur[key] = Object.assign({}, old[key] || {}, cur[key] || {});
      });
      cur.uiStyle = Object.assign(defaultUiStyle(), old.uiStyle || {}, cur.uiStyle || {});
      return normalizeLoadedApp(cur);
    }

    function countAppData(data) {
      const a = normalizeLoadedApp(data || {});
      const records = Object.keys(a.records || {}).filter(date => recordHasMeaningfulEntries(a.records[date])).length;
      return {
        records,
        trades: Array.isArray(a.trades) ? a.trades.length : 0,
        balances: Array.isArray(a.balances) ? a.balances.length : 0,
        memos: Object.keys(a.memos || {}).length + Object.keys(a.memoHtml || {}).length,
        extras: (a.watchExtras || []).length + (a.noteExtras || []).length + (a.memoManuals || []).length
      };
    }

    function countText(c) {
      return `날짜기록 ${fmtNum(c.records)}개 · 매매 ${fmtNum(c.trades)}묶음 · 잔고 ${fmtNum(c.balances)}묶음 · 메모 ${fmtNum(c.memos)}개 · 추가기록 ${fmtNum(c.extras)}개`;
    }

    async function manualRecoverData() {
      const legacy = readLegacyAppFromLocalStorage();
      if (!legacy) {
        alert('이 기기 안의 예전 localStorage 백업 기록을 찾지 못했습니다.\n\n클라우드에 저장한 적이 있다면 먼저 로그인 후 [동기화]를 눌러서 클라우드 데이터를 불러와 주세요.');
        return;
      }
      const oldCounts = countAppData(legacy.data);
      const curCounts = countAppData(app);
      const ok = confirm(`이전 저장기록을 찾았습니다.

찾은 위치: ${legacy.key}
찾은 기록: ${countText(oldCounts)}
현재 기록: ${countText(curCounts)}

[확인]을 누르면 이전 기록을 현재 앱에 합쳐 복구합니다.
현재 기록은 지우지 않고, 빠진 기록만 최대한 합칩니다.`);
      if (!ok) return;
      app = mergeRecoveredApp(app, legacy.data);
      await idbPut(DB_APP_KEY, app);
      saveSmallSettings();
      normalizeAccounts();
      render();
      toast('이전기록 복구/합치기 완료');
      alert('복구 시도가 완료되었습니다.\n\n' + countText(countAppData(app)) + '\n\n보이지 않는 기록이 있으면, 클라우드 동기화에 남아 있는지도 확인해 주세요.');
    }

    async function loadApp() {
      try {
        const stored = await idbGet(DB_APP_KEY);
        const legacy = readLegacyAppFromLocalStorage();
        if (stored) {
          const normalized = normalizeLoadedApp(stored);
          if (!isMeaningfulAppData(normalized) && legacy) {
            const recovered = normalizeLoadedApp(legacy.data);
            await idbPut(DB_APP_KEY, recovered);
            console.info(`이전 localStorage 기록(${legacy.key})을 복구했습니다.`);
            return recovered;
          }
          cleanupLargeLocalStorage();
          return normalized;
        }

        if (legacy) {
          const migrated = normalizeLoadedApp(legacy.data);
          await idbPut(DB_APP_KEY, migrated);
          cleanupLargeLocalStorage();
          console.info(`기존 localStorage 데이터(${legacy.key})를 IndexedDB로 마이그레이션했습니다.`);
          return migrated;
        }
        cleanupLargeLocalStorage();
        return emptyApp();
      } catch (e) {
        showStorageError(e);
        return emptyApp();
      }
    }

    function defaultAccounts() {
      return [
        { name: '기본계좌', originName: '기본계좌', uploadVisible: false, fixed: true },
        { name: '스윙계좌', originName: '스윙계좌', uploadVisible: true, core: true },
        { name: '단타계좌', originName: '단타계좌', uploadVisible: true, core: true },
        { name: '새계좌1', originName: '새계좌1', uploadVisible: false, userAccount: true },
        { name: '새계좌2', originName: '새계좌2', uploadVisible: false, userAccount: true }
      ];
    }

    function protectedAccountOrigin(account) {
      const origin = String(account?.originName || account?.name || '').trim();
      return ['기본계좌', '스윙계좌', '단타계좌'].includes(origin);
    }

    function accountNamesFromData() {
      const names = new Set();
      (app.trades || []).forEach(b => { if (b.account) names.add(b.account); });
      (app.balances || []).forEach(b => { if (b.account) names.add(b.account); });
      (app.memoManuals || []).forEach(m => { if (m.account) names.add(m.account); });
      return Array.from(names);
    }

    function normalizeAccounts() {
      const base = defaultAccounts();
      const saved = Array.isArray(app.accounts) ? app.accounts : [];
      const merged = [];
      const seenNames = new Set();
      const seenOrigins = new Set();
      const deletedOrigins = new Set(Array.isArray(app.deletedAccountOrigins) ? app.deletedAccountOrigins : []);
      const dataAccounts = accountNamesFromData().map(name => ({ name, originName: name, uploadVisible: name !== '기본계좌' }));

      [...saved, ...base, ...dataAccounts].forEach(item => {
        const name = String(item && item.name ? item.name : '').trim();
        const originName = String(item && (item.originName || item.name) ? (item.originName || item.name) : '').trim();
        if (!name || !originName) return;
        if (deletedOrigins.has(originName) && !accountNamesFromData().includes(name)) return;
        if (seenNames.has(name) || seenOrigins.has(originName)) return;
        seenNames.add(name);
        seenOrigins.add(originName);
        const baseItem = base.find(b => b.originName === originName || b.name === name) || {};
        merged.push({
          name,
          originName,
          uploadVisible: originName === '기본계좌' ? false : Boolean(item.uploadVisible ?? baseItem.uploadVisible),
          fixed: Boolean(item.fixed || baseItem.fixed),
          core: Boolean(item.core || baseItem.core),
          userAccount: Boolean(item.userAccount || baseItem.userAccount || !baseItem.name)
        });
      });
      app.accounts = merged;
      return app.accounts;
    }

    function getAccountEntries() {
      return normalizeAccounts();
    }

    function getActiveAccounts() {
      return getAccountEntries().map(a => a.name);
    }

    function getUploadAccounts() {
      const accounts = getAccountEntries().filter(a => a.name !== '기본계좌' && a.uploadVisible).map(a => a.name);
      return accounts.length ? accounts : ['스윙계좌', '단타계좌'].filter(a => getActiveAccounts().includes(a));
    }

    function accountExists(name) {
      return getAccountEntries().some(a => a.name === name);
    }

    function addAccount() {
      const input = document.getElementById('newAccountName');
      const name = String(input?.value || '').trim();
      if (!name) { alert('추가할 계좌명을 입력해 주세요.'); return; }
      if (accountExists(name)) { alert('이미 있는 계좌명입니다.'); return; }
      app.deletedAccountOrigins = (app.deletedAccountOrigins || []).filter(origin => origin !== name);
      app.accounts.push({ name, originName: name, uploadVisible: true, userAccount: true });
      if (input) input.value = '';
      saveApp();
      toast(`${name} 계좌를 추가했습니다.`);
      render();
    }

    function toggleUploadAccount(name, visible) {
      const item = getAccountEntries().find(a => a.name === name);
      if (!item || item.name === '기본계좌') return;
      item.uploadVisible = Boolean(visible);
      saveApp();
      render();
    }

    function moveAccount(name, dir) {
      const list = getAccountEntries();
      const idx = list.findIndex(a => a.name === name);
      const next = idx + dir;
      if (idx < 0 || next < 0 || next >= list.length) return;
      const fixedBasic = list[idx].name === '기본계좌' || list[next].name === '기본계좌';
      if (fixedBasic) return;
      const [item] = list.splice(idx, 1);
      list.splice(next, 0, item);
      app.accounts = list;
      saveApp();
      render();
    }

    function renameAccount(oldName, newName) {
      oldName = String(oldName || '').trim();
      newName = String(newName || '').trim();
      if (!oldName || !newName || oldName === newName) { render(); return; }
      if (oldName === '기본계좌') { alert('기본계좌 이름은 변경하지 않는 것이 안전합니다.'); render(); return; }
      if (accountExists(newName)) { alert('이미 있는 계좌명입니다.'); render(); return; }
      const list = getAccountEntries();
      const item = list.find(a => a.name === oldName);
      if (item) {
        item.originName = item.originName || oldName;
        item.name = newName;
      }
      (app.trades || []).forEach(b => { if (b.account === oldName) b.account = newName; });
      (app.balances || []).forEach(b => { if (b.account === oldName) b.account = newName; });
      (app.memoManuals || []).forEach(m => { if (m.account === oldName) m.account = newName; });
      const migrateKeyObject = obj => {
        if (!obj || typeof obj !== 'object') return;
        Object.keys(obj).forEach(k => {
          if (k === oldName || k.startsWith(oldName + '__')) {
            const nk = newName + k.slice(oldName.length);
            if (obj[nk] === undefined) obj[nk] = obj[k];
            delete obj[k];
          }
        });
      };
      ['memos','memoHtml','opinion1','opinion2','opinionHistory','classTags','memoDetails','memoFieldExtras','dailyHistoryChecks'].forEach(key => migrateKeyObject(app[key]));
      saveApp();
      toast(`${oldName} → ${newName}으로 변경했습니다.`);
      render();
    }

    function accountHasAnyData(name) {
      const inTrades = (app.trades || []).some(b => b.account === name);
      const inBalances = (app.balances || []).some(b => b.account === name);
      const inManuals = (app.memoManuals || []).some(m => m.account === name);
      const prefix = name + '__';
      const hasKeyData = ['memos','memoHtml','opinion1','opinion2','opinionHistory','classTags','memoDetails','memoFieldExtras','dailyHistoryChecks']
        .some(key => app[key] && Object.keys(app[key]).some(k => k === name || k.startsWith(prefix)));
      return inTrades || inBalances || inManuals || hasKeyData;
    }

    function deleteAccount(name) {
      name = String(name || '').trim();
      if (!name || name === '기본계좌') return;
      const list = getAccountEntries();
      const item = list.find(a => a.name === name);
      if (!item) return;
      if (protectedAccountOrigin(item)) {
        alert('기본 계좌(스윙계좌/단타계좌)는 삭제하지 않고 체크 해제로 숨겨서 사용해 주세요.');
        return;
      }
      const hasData = accountHasAnyData(name);
      const message = hasData
        ? `${name} 계좌를 삭제할까요?
이 계좌의 업로드 데이터, 메모, 의견, 분류, 목표가 기록도 함께 삭제됩니다.`
        : `${name} 계좌를 삭제할까요?`;
      if (!confirm(message)) return;
      app.accounts = list.filter(a => a.name !== name);
      app.deletedAccountOrigins = Array.from(new Set([...(app.deletedAccountOrigins || []), item.originName || name]));
      app.trades = (app.trades || []).filter(b => b.account !== name);
      app.balances = (app.balances || []).filter(b => b.account !== name);
      app.memoManuals = (app.memoManuals || []).filter(m => m.account !== name);
      const prefix = name + '__';

    function saveApp(options = {}) {
      saveSmallSettings();
      if (saveTimer) clearTimeout(saveTimer);
      const delay = options.immediate ? 0 : 120;
      saveTimer = setTimeout(() => {
        saveTimer = null;
        const snapshot = app;
        saveInFlight = saveInFlight
          .catch(() => {})
          .then(() => idbPut(DB_APP_KEY, snapshot))
          .then(() => cleanupLargeLocalStorage())
          .then(() => cloudQueueSave(snapshot))
          .catch(showStorageError);
      }, delay);
      return saveInFlight;
    }

    async function flushSaveApp() {
      if (saveTimer) {
        clearTimeout(saveTimer);
        saveTimer = null;
        try {
          await idbPut(DB_APP_KEY, app);
          cleanupLargeLocalStorage();
          if (cloudState.user && cloudState.client) await cloudSaveNow(app);
        } catch (e) {
          showStorageError(e);
        }
      }
      return saveInFlight;
    }

    function quoteFontFamily(name) {
      return `"${String(name || '').replace(/["\\]/g, '\\$&')}"`;
    }

    function safeFontName(fileName) {
      const base = String(fileName || '사용자글꼴').replace(/\.[^.]+$/, '').replace(/[^0-9A-Za-z가-힣 _-]/g, '').trim() || '사용자글꼴';
      return `사용자_${base}`;
    }

    function ensureCustomFontStyleElement() {
      let styleEl = document.getElementById('customFontFaces');
      if (!styleEl) {
        styleEl = document.createElement('style');
        styleEl.id = 'customFontFaces';
        document.head.appendChild(styleEl);
      }
      return styleEl;
    }

    function installCustomFonts() {
      const fonts = Array.isArray(app.customFonts) ? app.customFonts : [];
      const css = fonts.map(font => font && font.name && font.dataUrl ? `@font-face{font-family:${quoteFontFamily(font.name)};src:url(${font.dataUrl});font-display:swap;}` : '').join('\n');
      ensureCustomFontStyleElement().textContent = css;
    }

    function refreshFontOptions() {
      const select = document.getElementById('globalFontFamily');
      if (!select) return;
      const existing = new Set([...select.options].map(opt => opt.value));
      (app.customFonts || []).forEach(font => {
        if (!font || !font.name) return;
        const value = quoteFontFamily(font.name);
        if (!existing.has(value)) {
          const opt = document.createElement('option');
          opt.value = value;
          opt.textContent = `추가: ${font.name}`;
          select.appendChild(opt);
          existing.add(value);
        }
      });
    }

    function addCustomFontFile(file) {
      if (!file) return;
      if (!/\.(ttf|otf|woff2?|TTF|OTF|WOFF2?)$/.test(file.name)) {
        alert('ttf, otf, woff, woff2 글꼴 파일만 추가할 수 있습니다.');
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        const dataUrl = String(reader.result || '');
        const name = safeFontName(file.name);
        const font = { name, fileName: file.name, dataUrl };
        app.customFonts = (app.customFonts || []).filter(item => item.name !== name);
        if (file.size <= 1200000) {
          app.customFonts.push(font);
          installCustomFonts();
          setUiStyle('fontFamily', quoteFontFamily(name));
          toast('글꼴 추가 및 저장 완료');
        } else {
          installCustomFonts();
          const styleEl = ensureCustomFontStyleElement();
          styleEl.textContent += `
@font-face{font-family:${quoteFontFamily(name)};src:url(${dataUrl});font-display:swap;}`;
          const select = document.getElementById('globalFontFamily');
          if (select) {
            const opt = document.createElement('option');
            opt.value = quoteFontFamily(name);
            opt.textContent = `추가: ${name} (현재창)`;
            select.appendChild(opt);
          }
          app.uiStyle = Object.assign(defaultUiStyle(), app.uiStyle || {}, { fontFamily: quoteFontFamily(name) });
          applyUiStyle();
          toast('큰 글꼴은 현재 열린 창에서만 적용됩니다');
        }
      };
      reader.onerror = () => alert('글꼴 파일을 읽지 못했습니다.');
      reader.readAsDataURL(file);
    }

    function toYmd(date) {
      const d = date instanceof Date ? date : new Date(date);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function addDays(dateStr, days) {
      const d = new Date(String(dateStr || toYmd(new Date())) + 'T00:00:00');
      d.setDate(d.getDate() + Number(days || 0));
      return toYmd(d);
    }

    function storageDateForUpload(kind, baseDate = selectedDate) {
      // 계좌업로드: 당일매매와 당일잔고 모두 사용자가 선택한 날짜로 저장합니다.

    function weekday(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');

    }

    function nowStamp() {
      const d = new Date();
      const p = n => String(n).padStart(2, '0');
      return `${toYmd(d)} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
    }

    function esc(value) {
      return String(value ?? '').replace(/[&<>'"]/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[ch]));
    }

    function normalizeText(value) {
      return String(value ?? '').replace(/\s+/g, '').replace(/[()\[\]{}._\-\/\\]/g, '').toLowerCase();
    }

    function parseNumber(value) {
      if (value === null || value === undefined) return 0;
      let s = String(value).trim();
      if (!s) return 0;
      let negative = false;
      if (/^\(.*\)$/.test(s)) negative = true;
      if (s.includes('▲')) negative = false;
      if (s.includes('▼')) negative = true;
      s = s.replace(/,/g, '')
           .replace(/%/g, '')
           .replace(/원|주|번|회|\s/g, '')
           .replace(/[▲△+]/g, '')
           .replace(/[▼]/g, '-')
           .replace(/[()]/g, '')
           .replace(/[^0-9.\-]/g, '');
      const n = Number(s);
      if (!Number.isFinite(n)) return 0;
      return negative && n > 0 ? -n : n;
    }

    function fmtNum(value) {
      const n = Math.round(Number(value || 0));
      return Number.isFinite(n) ? n.toLocaleString('ko-KR', { maximumFractionDigits: 0 }) : '0';
    }

    function fmtRate(value) {
      const n = Number(value || 0);
      return Number.isFinite(n) ? `${n.toLocaleString('ko-KR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}%` : '0.00%';
    }

    function fmtRate2(value) {
      const n = Number(value || 0);
      return Number.isFinite(n) ? `${n.toLocaleString('ko-KR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}%` : '0.00%';
    }

    function fmtMoneyText(value) {
      const raw = String(value ?? '').trim();
      if (!raw) return '';
      if (!/[0-9]/.test(raw)) return raw;
      const n = parseNumber(raw);
      return Number.isFinite(n) ? Math.round(n).toLocaleString('ko-KR', { maximumFractionDigits: 0 }) : '';
    }

    function targetColorValue(value) {
      return TARGET_COLORS.some(item => item.value === value) ? value : 'black';
    }

    function targetColorCss(value) {
      const found = TARGET_COLORS.find(item => item.value === targetColorValue(value));
      return found ? found.css : '#111827';
    }

    function targetColorOptions(selected) {

      return TARGET_COLORS.map(item => `<option value="${esc(item.value)}" ${item.value === value ? 'selected' : ''} aria-label="${esc(item.label)}"></option>`).join('');

    function targetColorSelectHtml(account, code, date, source, field, color) {

    }

    function normalizeMoneyInput(el) {
      if (!el) return '';
      const formatted = fmtMoneyText(el.value);
      el.value = formatted;
      if (typeof el.setSelectionRange === 'function') {
        const end = el.value.length;

      }
      return formatted;
    }

    function profitClass(value) {
      const n = Number(value || 0);
      if (n > 0) return 'profit-plus';
      if (n < 0) return 'profit-minus';
      return '';
    }

    function normalizeStockCode(value) {
      let s = String(value ?? '').trim();
      s = s.replace(/^=/, '').replace(/^['"]+|['"]+$/g, '').replace(/^A/i, '');
      s = s.replace(/[^0-9]/g, '');
      return s.padStart(Math.min(6, Math.max(0, s.length)), '0');
    }

    function opKey(account, code) { return `${account}__${code}`; }
    function normSource(source = '') {
      return source === 'trade' || source === 'balance' ? source : '';
    }
    function sourceLabel(source = '') {
      return normSource(source) === 'trade' ? '당일매매' : (normSource(source) === 'balance' ? '당일잔고' : '공통');
    }
    function sourceSortPriority(source = '') {
      const s = normSource(source);
      // 같은 날짜에 당일매매와 당일잔고가 함께 있으면 당일잔고를 최신 데이터로 봅니다.
      if (s === 'balance') return 2;
      if (s === 'trade') return 1;
      return 0;
    }
    function sourceOrder(source = '') {
      const s = normSource(source);
      // 표와 팝업 이력에서 같은 날짜라면 당일잔고가 당일매매보다 위에 오도록 합니다.
      if (s === 'balance') return 0;
      if (s === 'trade') return 1;
      return 2;
    }
    function compareDateSourceDesc(a, b) {
      const ad = String(a?.date || '');
      const bd = String(b?.date || '');
      if (ad !== bd) return bd.localeCompare(ad);
      const sp = sourceSortPriority(b?.source || '') - sourceSortPriority(a?.source || '');
      if (sp) return sp;
      const at = String(a?.at || '');
      const bt = String(b?.at || '');
      if (at !== bt) return bt.localeCompare(at);
      return String(a?.stockName || a?.stockCode || '').localeCompare(String(b?.stockName || b?.stockCode || ''), 'ko-KR');
    }
    function dataSourceAttr(source = '') {
      const s = normSource(source);
      return s ? ` data-source="${esc(s)}"` : '';
    }
    function scopedKey(account, code, date = '', source = '') {
      const base = date ? `${account}__${code}__${date}` : `${account}__${code}`;
      const s = normSource(source);
      return s && date ? `${base}__${s}` : base;
    }
    function opHistKey(account, code, date, source = '') { return scopedKey(account, code, date, source); }
    function categoryValues(key) {
      if (key === 'classTag') return CLASS_TAGS.map(item => item.value).filter(Boolean);
      if (key === 'op1') return OP1_LIST.slice();
      if (key === 'op2') return OP2_LIST.slice();
      if (key === 'status') return ['보유', '매수', '매도', '관망', '기타'];
      return null;
    }

    function classSortRank(value) {
      const order = categoryValues('classTag') || [];
      const idx = order.indexOf(value || '');
      return idx >= 0 ? idx : 999;
    }

    function categorySortRank(key, value) {
      const order = categoryValues(key);
      if (!order) return null;
      const idx = order.indexOf(String(value || ''));
      return idx >= 0 ? idx : 999;
    }

    function categoricalCompare(a, b, key, state = {}) {
      const order = categoryValues(key);
      if (!order) return null;
      const av = String(a ?? '');
      const bv = String(b ?? '');
      const top = state.groupTop || '';
      if (top) {
        const atop = av === top ? 0 : 1;
        const btop = bv === top ? 0 : 1;
        if (atop !== btop) return atop - btop;
      }
      const ai = order.indexOf(av);
      const bi = order.indexOf(bv);
      return ((ai >= 0 ? ai : 999) - (bi >= 0 ? bi : 999));
    }

    function advanceGroupSort(state, key) {
      const order = categoryValues(key);
      if (!order) {
        if (state.key === key || state.sortKey === key) state.dir = state.dir === 'asc' ? 'desc' : 'asc';
        else state.dir = 'asc';
        state.groupTop = '';
        return;
      }
      const prevKey = state.key || state.sortKey;
      const currentIndex = prevKey === key ? order.indexOf(state.groupTop || '') : -1;
      state.groupTop = order[(currentIndex + 1) % order.length];
      state.dir = 'group';
    }

    function extractDateFromScopedKey(key, prefix) {
      const rest = String(key || '').slice(prefix.length);
      return rest.split('__')[0] || '';
    }

    function ensureRecord(date) {
      if (!app.records[date]) {
        app.records[date] = {
          date,
          weather: WEATHER[0],
          mood: MOODS[0],
          prep: [],
          todo: [],
          routine: [],
          watch: [],
          noteHtml: '',
          noteText: '',
          noteDrawData: ''
        };
      } else {
        app.records[date] = normalizeTodayRecord(app.records[date], date);
      }
      return app.records[date];
    }

    function findLatestOpinionBefore(account, code, date) {
      const prefix = `${account}__${code}__`;
      const candidates = Object.keys(app.opinionHistory || {})
        .filter(k => k.startsWith(prefix))
        .map(k => ({ key: k, date: extractDateFromScopedKey(k, prefix) }))
        .filter(x => x.date && x.date < date)
        .sort((a, b) => b.date.localeCompare(a.date));
      if (candidates.length) return app.opinionHistory[candidates[0].key];
      const k = opKey(account, code);
      if (app.opinion1[k] || app.opinion2[k]) return { op1: app.opinion1[k] || DEFAULT_OP1, op2: app.opinion2[k] || DEFAULT_OP2 };
      return null;
    }

    function latestTradeSellStampBefore(account, code, date) {
      let stamp = '';
      (app.trades || []).forEach(batch => {
        if (batch.account !== account || !batch.date || batch.date >= date) return;
        const sold = (batch.items || []).some(item => item.stockCode === code && Number(item.sellQty || 0) > 0);
        if (!sold) return;
        const current = `${batch.date} ${batch.at || ''}`;
        if (current > stamp) stamp = current;
      });
      return stamp;
    }

    function latestPositiveBalanceStampBefore(account, code, date) {
      let stamp = '';
      (app.balances || []).forEach(batch => {
        if (batch.account !== account || !batch.date || batch.date >= date) return;
        const held = (batch.items || []).some(item => item.stockCode === code && Number(item.quantity || 0) > 0);
        if (!held) return;
        const current = `${batch.date} ${batch.at || ''}`;
        if (current > stamp) stamp = current;
      });
      return stamp;
    }

    function shouldResetOpinionAfterSell(account, code, date) {
      const sellStamp = latestTradeSellStampBefore(account, code, date);
      if (!sellStamp) return false;
      const holdingStamp = latestPositiveBalanceStampBefore(account, code, date);
      return !holdingStamp || holdingStamp < sellStamp;
    }

    function ensureOpinion(account, code, date, preferPrevious = false, source = '') {
      if (!code) return { op1: DEFAULT_OP1, op2: DEFAULT_OP2 };
      const hk = opHistKey(account, code, date, source);
      const legacyKey = opHistKey(account, code, date, '');
      if (!app.opinionHistory[hk]) {
        const resetAfterSell = preferPrevious && shouldResetOpinionAfterSell(account, code, date);
        const prev = preferPrevious && !resetAfterSell ? findLatestOpinionBefore(account, code, date) : null;
        const legacy = source && app.opinionHistory[legacyKey] ? app.opinionHistory[legacyKey] : null;
        const k = opKey(account, code);
        app.opinionHistory[hk] = {
          op1: (prev && prev.op1) || (legacy && legacy.op1) || (!preferPrevious ? app.opinion1[k] : '') || DEFAULT_OP1,
          op2: (prev && prev.op2) || (legacy && legacy.op2) || (!preferPrevious ? app.opinion2[k] : '') || DEFAULT_OP2
        };
      }
      const opinion = app.opinionHistory[hk];
      const k = opKey(account, code);
      app.opinion1[k] = opinion.op1 || DEFAULT_OP1;
      app.opinion2[k] = opinion.op2 || DEFAULT_OP2;
      return opinion;
    }

    function getOpinion(account, code, date, source = '') {
      const hk = opHistKey(account, code, date, source);
      if (app.opinionHistory[hk]) return app.opinionHistory[hk];
      const legacyKey = opHistKey(account, code, date, '');
      if (source && app.opinionHistory[legacyKey]) return app.opinionHistory[legacyKey];
      const resetAfterSell = shouldResetOpinionAfterSell(account, code, date);
      const prev = resetAfterSell ? null : findLatestOpinionBefore(account, code, date);
      const k = opKey(account, code);
      return {
        op1: (prev && prev.op1) || (!resetAfterSell ? app.opinion1[k] : '') || DEFAULT_OP1,
        op2: (prev && prev.op2) || (!resetAfterSell ? app.opinion2[k] : '') || DEFAULT_OP2
      };
    }

    function setOpinion(account, code, date, field, value, source = '') {
      const opinion = ensureOpinion(account, code, date, true, source);
      opinion[field] = value;
      const k = opKey(account, code);
      app.opinion1[k] = opinion.op1 || DEFAULT_OP1;
      app.opinion2[k] = opinion.op2 || DEFAULT_OP2;
      app.opinionHistory[opHistKey(account, code, date, source)] = opinion;
      saveApp();
    }


    function latestPriorHoldingBefore(account, code, date) {
      let latest = null;
      (app.balances || []).forEach(batch => {
        if (!batch || batch.account !== account || !batch.date || batch.date >= date) return;
        (batch.items || []).forEach(item => {
          if (item.stockCode !== code) return;
          if (!latest || batch.date > latest.date || (batch.date === latest.date && String(batch.at || '') > String(latest.at || ''))) {
            latest = { date: batch.date, at: batch.at || '', item };
          }
        });
      });
      return latest;
    }

    function shouldKeepPreviousOp2OnUpload(account, code, date) {
      const prior = latestPriorHoldingBefore(account, code, date);
      return !!(prior && Number(prior.item?.quantity || 0) > 0);
    }

    function latestClassTagBefore(account, code, date) {
      app.classTags = app.classTags || {};
      const prefix = `${account}__${code}__`;
      const candidates = Object.keys(app.classTags)
        .filter(k => k.startsWith(prefix))
        .map(k => ({ key: k, date: extractDateFromScopedKey(k, prefix), value: app.classTags[k] }))
        .filter(x => x.date && x.date < date && x.value)
        .sort((a, b) => b.date.localeCompare(a.date));
      return candidates.length ? candidates[0].value : '';
    }

    function resetUploadOpinions(account, items, date, source = '') {
      app.opinionHistory = app.opinionHistory || {};
      app.opinion1 = app.opinion1 || {};
      app.opinion2 = app.opinion2 || {};
      app.classTags = app.classTags || {};
      const s = normSource(source);
      (items || []).forEach(item => {
        const code = item && item.stockCode;
        if (!code) return;
        const key = opKey(account, code);
        const sameSourceOpinion = app.opinionHistory[opHistKey(account, code, date, s)] || app.opinionHistory[opHistKey(account, code, date, '')] || null;
        const prevOpinion = findLatestOpinionBefore(account, code, date);
        const keepOp2 = shouldKeepPreviousOp2OnUpload(account, code, date) || !!(sameSourceOpinion && sameSourceOpinion.op2);
        const opinion = { op1: DEFAULT_OP1, op2: keepOp2 ? ((sameSourceOpinion && sameSourceOpinion.op2) || (prevOpinion && prevOpinion.op2) || DEFAULT_OP2) : DEFAULT_OP2 };
        app.opinionHistory[opHistKey(account, code, date, s)] = { ...opinion };
        if (s) app.opinionHistory[opHistKey(account, code, date, '')] = { ...opinion };
        app.opinion1[key] = DEFAULT_OP1;
        app.opinion2[key] = opinion.op2 || DEFAULT_OP2;

        const isHoldingBalance = s === 'balance' && Number(item.quantity || 0) > 0;
        const latestTag = isHoldingBalance ? latestClassTagBefore(account, code, date) : '';
        if (latestTag) {
          app.classTags[classTagKey(account, code, date, s)] = latestTag;
          if (s) app.classTags[classTagKey(account, code, date, '')] = latestTag;
        } else {
          delete app.classTags[classTagKey(account, code, date, s)];
          if (s) delete app.classTags[classTagKey(account, code, date, '')];
        }
      });
    }

    function memoStorageKey(account, code, date = '', source = '') {
      return scopedKey(account, code, date, source);
    }

    function stockRecordDates(account, code) {
      const dates = new Set();
      (app.trades || []).forEach(batch => {
        if (batch.account === account && (batch.items || []).some(item => item.stockCode === code)) dates.add(batch.date);
      });
      (app.balances || []).forEach(batch => {
        if (batch.account === account && (batch.items || []).some(item => item.stockCode === code)) dates.add(batch.date);
      });
      return Array.from(dates).sort();
    }

    function legacyMemoAllowedForDate(account, code, date) {
      if (!date) return true;
      const dates = stockRecordDates(account, code);
      return dates.length === 1 && dates[0] === date;
    }

    function memoHtmlOf(account, code, date = '', source = '') {
      app.memoHtml = app.memoHtml || {};
      const datedKey = memoStorageKey(account, code, date, source);
      if (app.memoHtml[datedKey]) return app.memoHtml[datedKey];
      const noSourceKey = source ? memoStorageKey(account, code, date, '') : '';
      if (noSourceKey && app.memoHtml[noSourceKey]) return app.memoHtml[noSourceKey];
      const legacyKey = opKey(account, code);
      if (date && legacyMemoAllowedForDate(account, code, date)) return app.memoHtml[legacyKey] || '';
      return !date ? (app.memoHtml[legacyKey] || '') : '';
    }

    function memoOf(account, code, date = '', source = '') {
      app.memos = app.memos || {};
      const html = memoHtmlOf(account, code, date, source);
      const textFromHtml = html ? plainFromHtml(html) : '';
      if (textFromHtml) return textFromHtml;
      const datedKey = memoStorageKey(account, code, date, source);
      if (app.memos[datedKey]) return app.memos[datedKey];
      const noSourceKey = source ? memoStorageKey(account, code, date, '') : '';
      if (noSourceKey && app.memos[noSourceKey]) return app.memos[noSourceKey];
      const legacyKey = opKey(account, code);
      if (date && legacyMemoAllowedForDate(account, code, date)) return app.memos[legacyKey] || '';
      return !date ? (app.memos[legacyKey] || '') : '';
    }

    function setMemo(account, code, date, memo, memoHtml = '', source = '') {
      const key = memoStorageKey(account, code, date, source);
      app.memos = app.memos || {};
      app.memos[key] = memo || '';
      app.memoHtml = app.memoHtml || {};
      if (memoHtml) app.memoHtml[key] = cleanHtml(memoHtml);
      else delete app.memoHtml[key];
      saveApp();
    }

    function optionHtml(list, selected) {
      return list.map(v => `<option value="${esc(v)}" ${v === selected ? 'selected' : ''}>${esc(v)}</option>`).join('');
    }

    function opinionOptionHtml(list, selected) {
      return list.map(v => {

    function opinionSelect(account, code, date, field, source = '') {

    }

    function classTagKey(account, code, date = '', source = '') { return scopedKey(account, code, date, source); }

    function getClassTag(account, code, date = '', source = '') {
      app.classTags = app.classTags || {};
      if (!account || !code) return '';
      const exact = app.classTags[classTagKey(account, code, date, source)];
      if (exact) return exact;
      return source ? (app.classTags[classTagKey(account, code, date, '')] || '') : '';
    }

    function setClassTag(account, code, date, value, source = '') {
      app.classTags = app.classTags || {};
      const key = classTagKey(account, code, date, source);

    function classTagLabel(value) {

    function classTagSelect(account, code, date, extraAttrs = '', source = '') {
      const value = getClassTag(account, code, date, source);

    function fitMoneyInputToBox(el) {
      if (!el) return;
      const value = String(el.value || '');
      el.title = value;
      const base = el.classList && el.classList.contains('mini-target-input') ? 9.8 : 10.3;
      const min = 7.1;
      let size = base;
      el.style.fontSize = `${size}px`;
      el.style.letterSpacing = '-0.05em';
      let guard = 0;
      while (el.scrollWidth > el.clientWidth && size > min && guard < 14) {
        size -= 0.35;
        el.style.fontSize = `${size}px`;
        guard += 1;
      }
    }

    function fitAllMoneyInputsToBox() {
      document.querySelectorAll('input[data-field="target1"], input[data-field="target2"], .auto-fit-money').forEach(fitMoneyInputToBox);

    function renderMiniTradeTable(rows, kind, account) {
