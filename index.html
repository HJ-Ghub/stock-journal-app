        const amount = kind === 'trade' ? tradeAmount(row) : row.evalAmount;
        const rowSource = row.source || kind;
        const opinion = getOpinion(row.account, code, row.date, rowSource);
        const detail = latestTargetDetailForDisplay(row.account, code, row.date, rowSource);
        return {
          ...row,
          qty,
          amount,
          returnRate: Number(row.returnRate || 0),
          dayChangeRate: Number(row.dayChangeRate || 0),
          currentPrice: Number(row.currentPrice || row.sellPrice || row.buyPrice || 0),
          target1: detail.target1 || '',
          target2: detail.target2 || '',
          classTag: getClassTag(row.account, code, row.date, rowSource),
          memo: memoOf(row.account, code, row.date, rowSource),
          op1: opinion.op1,
          op2: opinion.op2
        };
      }).filter(row => matchesSearch(row, state.search));
      const visibleRows = applyMiniSort(decorated, state);
      const searchId = `mini-${kind}-${account}`.replace(/\s+/g, '-');
      const searchBar = `<div class="mini-search-row"><label class="tiny" for="${esc(searchId)}">종목명 검색</label><input id="${esc(searchId)}" type="search" value="${esc(state.search)}" data-action="mini-search" data-account="${esc(account)}" data-kind="${esc(kind)}" placeholder="종목명 또는 코드" /><span class="tiny">표시 ${fmtNum(visibleRows.length)}건</span></div>`;
      if (!rows.length) return `${searchBar}<div class="empty">업로드된 목록이 없습니다.</div>`;
      if (!visibleRows.length) return `${searchBar}<div class="empty">검색 결과가 없습니다.</div>`;
      const body = visibleRows.map((row, idx) => {
        const code = row.stockCode;
        const target1Input = targetInputCellHtml(row.account, code, row.date, row.source || kind, 'target1', row.target1, 'mini-target-input');
        const target2Input = targetInputCellHtml(row.account, code, row.date, row.source || kind, 'target2', row.target2, 'mini-target-input');
        const dayChangeCell = kind === 'trade' ? '' : `<td class="num rate-compact ${profitClass(row.dayChangeRate)}">${fmtRate2(row.dayChangeRate)}</td>`;
        return `<tr>
          <td class="center row-no">${fmtNum(idx + 1)}</td>
          <td><span class="name-link mini-stock-name" data-action="show-history" data-account="${esc(row.account)}" data-code="${esc(code)}" data-name="${esc(row.stockName)}" title="${esc(row.stockName)}">${esc(row.stockName)}</span></td>
          <td class="center">${opinionSelect(row.account, code, row.date, 'op1', row.source || kind)}</td>
          <td class="center">${opinionSelect(row.account, code, row.date, 'op2', row.source || kind)}</td>
          <td>${target1Input}</td>
          <td>${target2Input}</td>
          <td class="class-tag-cell">${classTagSelect(row.account, code, row.date, '', row.source || kind)}</td>
          <td class="memo-cell" data-action="open-memo" data-account="${esc(row.account)}" data-code="${esc(code)}" data-date="${esc(row.date)}"${dataSourceAttr(row.source || kind)} data-name="${esc(row.stockName)}" title="더블클릭하면 큰 메모창이 열립니다.">${esc(row.memo || '')}</td>
          <td class="num rate-compact ${profitClass(row.returnRate)}">${fmtRate2(row.returnRate)}</td>
          ${dayChangeCell}
          <td class="num">${fmtNum(row.currentPrice)}</td>
          <td class="num rate-compact">${fmtNum(row.qty)}</td>
          <td class="num">${fmtNum(row.amount)}</td>
          <td class="num ${profitClass(row.profit)}">${fmtNum(row.profit)}</td>
          <td class="delete-col"><button class="btn-small btn-danger" data-action="delete-stock" data-account="${esc(row.account)}" data-code="${esc(code)}" data-name="${esc(row.stockName)}">삭제</button></td>
        </tr>`;
      }).join('');
      const headers = [
        ['rowNo', '번호'], ['stockName', '종목'], ['op1', '의견1'], ['op2', '의견2'], ['target1', '목표가1'], ['target2', '목표가2'], ['classTag', '분류'], ['memo', '메모'], ['returnRate', '수익률']
      ];
      if (kind !== 'trade') headers.push(['dayChangeRate', '당일<br>등락률']);
      headers.push(['currentPrice', '현재가'], ['qty', '수량'], ['amount', kind === 'trade' ? '매매금액' : '평가금액'], ['profit', '손익'], ['delete', '삭제']);
      const headerClass = (key) => ({
        returnRate: 'header-rate',
        dayChangeRate: 'header-dayrate',
        classTag: 'header-class',
        currentPrice: 'header-current',
        qty: 'header-qty',
        amount: 'header-amount',
        profit: 'header-profit',
        delete: 'header-delete'
      }[key] || '');
      const tradeCols = '<col style="width:3.2%"><col style="width:12.8%"><col style="width:4.8%"><col style="width:4.8%"><col style="width:7.5%"><col style="width:7.5%"><col style="width:2.8%"><col style="width:16%"><col class="col-return" style="width:7%"><col style="width:6.5%"><col class="col-qty" style="width:4.2%"><col style="width:10.5%"><col style="width:8%"><col style="width:4.4%">';
      const balanceCols = '<col style="width:3.1%"><col style="width:10.5%"><col style="width:4.5%"><col style="width:4.5%"><col style="width:6.8%"><col style="width:6.8%"><col style="width:2.7%"><col style="width:14%"><col class="col-return" style="width:6.8%"><col class="col-dayrate" style="width:7.7%"><col style="width:6.2%"><col class="col-qty" style="width:4%"><col style="width:8.8%"><col style="width:7%"><col style="width:6.6%">';
      const colgroup = kind === 'trade' ? tradeCols : balanceCols;
      return `${searchBar}<div class="table-wrap mini-table-wrap ${kind === 'trade' ? 'trade-list' : 'balance-list'}"><table class="mini-upload-table"><colgroup>${colgroup}</colgroup><thead><tr>${headers.map(([key, title]) => key === 'rowNo' ? `<th class="row-no-col">${title}</th>` : key === 'delete' ? `<th class="delete-col ${headerClass(key)}">${title}</th>` : `<th class="sortable ${headerClass(key)}" data-action="mini-sort" data-account="${esc(account)}" data-kind="${esc(kind)}" data-key="${esc(key)}">${title}</th>`).join('')}</tr></thead><tbody>${body}</tbody></table></div>`;
    }

    function todayUploadKey(account, kind) {
      return `${account}__${kind}`;
    }

    function getTodayUploadState(account, kind) {
      const key = todayUploadKey(account, kind);
      if (!todayUploadState[key]) todayUploadState[key] = { search: '', sortKey: 'stockName', dir: 'asc' };
      return todayUploadState[key];
    }

    function applyMiniSort(rows, state) {
      const key = state.sortKey || 'stockName';
      const dir = state.dir === 'desc' ? -1 : 1;
      return [...rows].sort((a, b) => {
        const av = a[key] ?? '';
        const bv = b[key] ?? '';
        const catA = categorySortRank(key, av);
        const catB = categorySortRank(key, bv);
        if (catA !== null || catB !== null) return ((catA ?? 999) - (catB ?? 999)) * dir;
        if (['qty', 'amount', 'profit', 'returnRate', 'dayChangeRate', 'currentPrice', 'avgRate', 'target1', 'target2', 'quantity', 'evalAmount', 'buyAmount'].includes(key)) return (parseNumber(av) - parseNumber(bv)) * dir;
        if (typeof av === 'number' || typeof bv === 'number') return (Number(av || 0) - Number(bv || 0)) * dir;
        return String(av).localeCompare(String(bv), 'ko-KR') * dir;
      });
    }

    function toggleMiniSort(account, kind, key) {
      const state = getTodayUploadState(account, kind);
      advanceGroupSort(state, key);
      state.sortKey = key;
      render();
    }

    function tradeAmount(row) {
      const manual = Number(row.manualAmount || row.amount || 0);
      if (Number.isFinite(manual) && manual > 0) return manual;
      const sell = Number(row.sellPrice || 0) * Number(row.sellQty || 0);
      const buy = Number(row.buyPrice || 0) * Number(row.buyQty || 0);
      return sell || buy || 0;
    }

    function renderPerformance() {
      const filters = readPerformanceFilters();
      let rows = getPerformanceRows(filters);
      rows = applySort(rows, sortState.performance);
      const metrics = calcPerformanceMetrics(rows, filters);
      root.innerHTML = `
        <section class="fixed-list-layout">
          <div class="card">
            <div class="section-title"><h2>계좌별 성과</h2><span class="hint">종목명 클릭 시 과거 이력을 볼 수 있습니다.</span></div>
            <div class="toolbar">
              ${accountFilterHtml('perfAccount', filters.account)}
              <div class="field wide"><label for="perfSearch">종목명/종목코드 검색</label><input id="perfSearch" type="search" value="${esc(filters.search)}" placeholder="예: 삼성전자 또는 005930" /></div>
              <button data-action="reset-filters" data-target="performance">초기화</button>
            </div>
            <div class="grid grid-4">
              <div class="metric"><div class="label">실현손익</div><div class="value ${profitClass(metrics.realized)}">${fmtNum(metrics.realized)}원</div></div>
              <div class="metric"><div class="label">매매횟수</div><div class="value">${fmtNum(metrics.count)}회</div></div>
              <div class="metric"><div class="label">승률</div><div class="value">${fmtRate(metrics.winRate)}</div></div>
              <div class="metric"><div class="label">현재 보유 평가손익</div><div class="value ${profitClass(metrics.currentProfit)}">${fmtNum(metrics.currentProfit)}원</div></div>
            </div>
          </div>
          <div class="card list-body-card">
            <div class="section-title"><h3>종목별 매매현황</h3><span class="tiny">삭제 컬럼은 맨 오른쪽 1개만 표시됩니다.</span></div>
            ${renderPerformanceTable(rows)}
          </div>
        </section>`;
    }

    function readPerformanceFilters() {
      return { account: performanceFilterState.account || '전체계좌', search: performanceFilterState.search || '' };
    }

    function accountFilterHtml(id, selected) {
      return `<div class="field"><label for="${id}">계좌 필터</label><select id="${id}"><option ${selected === '전체계좌' ? 'selected' : ''}>전체계좌</option>${getActiveAccounts().map(a => `<option ${selected === a ? 'selected' : ''}>${esc(a)}</option>`).join('')}</select></div>`;
    }

    function getPerformanceRows(filters) {
      const map = new Map();
      app.trades.forEach(batch => {
        if (filters.account !== '전체계좌' && batch.account !== filters.account) return;
        (batch.items || []).forEach(item => {
          const code = item.stockCode;
          if (!matchesSearch(item, filters.search)) return;
          const key = opKey(batch.account, code);
          if (!map.has(key)) {
            map.set(key, {
              account: batch.account,
              stockCode: code,
              stockName: item.stockName,
              tradeCount: 0,
              wins: 0,
              losses: 0,
              profitSum: 0,
              rateSum: 0,
              rateCount: 0,
              latestDate: batch.date,
              source: 'trade'
            });
          }
          const row = map.get(key);
          row.stockName = item.stockName || row.stockName;
          row.tradeCount += 1;
          const profit = Number(item.profit || 0);
          row.profitSum += profit;
          if (profit > 0) row.wins += 1;
          if (profit < 0) row.losses += 1;
          if (Number.isFinite(Number(item.returnRate))) { row.rateSum += Number(item.returnRate || 0); row.rateCount += 1; }
          if (batch.date > row.latestDate) row.latestDate = batch.date;
        });
      });
      getLatestBalanceRowsRaw().forEach(b => {
        if (filters.account !== '전체계좌' && b.account !== filters.account) return;
        if (!matchesSearch(b, filters.search)) return;
        const key = opKey(b.account, b.stockCode);
        if (!map.has(key)) {
          map.set(key, {
            account: b.account,
            stockCode: b.stockCode,
            stockName: b.stockName,
            tradeCount: 0,
            wins: 0,
            losses: 0,
            profitSum: 0,
            rateSum: 0,
            rateCount: 0,
            latestDate: b.date,
            source: b.source || 'balance'
          });
        }
        const row = map.get(key);
        row.currentQty = Number(b.quantity || 0);
        row.currentEvalAmount = Number(b.evalAmount || 0);
        row.currentProfit = Number(b.profit || 0);
        if (b.date >= row.latestDate) {
          row.latestDate = b.date;
          row.source = b.source || 'balance';
          row.stockName = b.stockName || row.stockName;
        }
      });
      return Array.from(map.values()).map(row => {
        const op = getOpinion(row.account, row.stockCode, row.latestDate || selectedDate, row.source || 'trade');
        row.op1 = op.op1;
        row.op2 = op.op2;
        const detail = getLatestMemoDetail(row.account, row.stockCode, row.latestDate || selectedDate, row.source || 'trade');
        row.target1 = detail.target1 || '';
        row.target2 = detail.target2 || '';
        row.classTag = getClassTag(row.account, row.stockCode, row.latestDate || selectedDate, row.source || 'trade');
        row.memo = memoOf(row.account, row.stockCode, row.latestDate || selectedDate, row.source || 'trade');
        row.winRate = (row.wins + row.losses) ? row.wins / (row.wins + row.losses) * 100 : 0;
        row.avgRate = row.rateCount ? row.rateSum / row.rateCount : 0;
        row.returnRate = row.avgRate;
        const latestSourceRow = getAllStockSourceRows().filter(x => x.account === row.account && x.stockCode === row.stockCode).sort(compareDateSourceDesc)[0] || {};
        row.currentPrice = Number(latestSourceRow.currentPrice || 0);
        row.currentPriceKind = latestSourceRow.currentPriceKind || '';
        row.dayChangeRate = Number(latestSourceRow.dayChangeRate || 0);
        row.currentQty = row.currentQty || 0;
        row.currentEvalAmount = row.currentEvalAmount || 0;
        row.currentProfit = row.currentProfit || 0;
        return row;
      });
    }

    function calcPerformanceMetrics(rows) {
      const realized = rows.reduce((sum, r) => sum + Number(r.profitSum || 0), 0);
      const count = rows.reduce((sum, r) => sum + Number(r.tradeCount || 0), 0);
      const wins = rows.reduce((sum, r) => sum + Number(r.wins || 0), 0);
      const losses = rows.reduce((sum, r) => sum + Number(r.losses || 0), 0);
      const currentProfit = rows.reduce((sum, r) => sum + Number(r.currentProfit || 0), 0);
      return { realized, count, winRate: wins + losses ? wins / (wins + losses) * 100 : 0, currentProfit };
    }

    function renderPerformanceTable(rows) {
      if (!rows.length) return '<div class="empty">표시할 매매현황이 없습니다.</div>';
      const headers = [
        ['account','계좌'], ['stockCode','종목코드'], ['rowNo','번호'], ['stockName','종목명'], ['op1','의견1'], ['op2','의견2'], ['target1','목표가1'], ['target2','목표가2'], ['classTag','분류'], ['memo','메모'], ['returnRate','수익률'], ['dayChangeRate','당일등락률'], ['currentPrice','현재가'],
        ['tradeCount','매매횟수'], ['wins','승리'], ['losses','패배'], ['winRate','승률'], ['profitSum','손익합계'], ['avgRate','평균수익률'],
        ['currentQty','현재보유수량'], ['currentEvalAmount','현재평가금액'], ['delete','삭제']
      ];
      const body = rows.map((r, idx) => `<tr>
        <td>${esc(r.account)}</td>
        <td>${esc(r.stockCode)}</td>
        <td class="center row-no">${fmtNum(idx + 1)}</td>
        <td><span class="name-link" data-action="show-history" data-account="${esc(r.account)}" data-code="${esc(r.stockCode)}" data-name="${esc(r.stockName)}">${esc(r.stockName)}</span></td>
        <td class="center">${opinionSelect(r.account, r.stockCode, r.latestDate || selectedDate, 'op1', r.source || 'trade')}</td>
        <td class="center">${opinionSelect(r.account, r.stockCode, r.latestDate || selectedDate, 'op2', r.source || 'trade')}</td>
        <td>${targetInputCellHtml(r.account, r.stockCode, r.latestDate || selectedDate, r.source || 'trade', 'target1', r.target1, 'stock-target-input')}</td>
        <td>${targetInputCellHtml(r.account, r.stockCode, r.latestDate || selectedDate, r.source || 'trade', 'target2', r.target2, 'stock-target-input')}</td>
        <td class="class-tag-cell">${classTagSelect(r.account, r.stockCode, r.latestDate || selectedDate, '', r.source || 'trade')}</td>
        <td class="memo-cell" data-action="open-memo" data-account="${esc(r.account)}" data-code="${esc(r.stockCode)}" data-date="${esc(r.latestDate || r.date || r.recentDate || selectedDate)}"${dataSourceAttr(r.source || 'trade')} data-name="${esc(r.stockName)}">${esc(r.memo || '')}</td>
        <td class="num ${profitClass(r.returnRate)}">${fmtRate(r.returnRate)}</td>
        <td class="num ${profitClass(r.dayChangeRate)}">${fmtRate(r.dayChangeRate)}</td>
        <td class="num ${currentPriceClass(r)}">${fmtNum(r.currentPrice)}</td>
        <td class="num narrow">${fmtNum(r.tradeCount)}</td>
        <td class="num narrow">${fmtNum(r.wins)}</td>
        <td class="num narrow">${fmtNum(r.losses)}</td>
        <td class="num narrow">${fmtRate(r.winRate)}</td>
        <td class="num ${profitClass(r.profitSum)}">${fmtNum(r.profitSum)}</td>
        <td class="num">${fmtRate(r.avgRate)}</td>
        <td class="num narrow">${fmtNum(r.currentQty)}</td>
        <td class="num">${fmtNum(r.currentEvalAmount)}</td>
        <td class="delete-col"><button class="btn-small btn-danger" data-action="delete-stock" data-account="${esc(r.account)}" data-code="${esc(r.stockCode)}" data-name="${esc(r.stockName)}">삭제</button></td>
      </tr>`).join('');
      return `<div class="table-wrap rows-25-scroll"><table class="main-list-table performance-table"><colgroup><col style="width:4%"><col style="width:5%"><col style="width:3%"><col style="width:7%"><col style="width:4.6%"><col style="width:4.8%"><col style="width:5%"><col style="width:5%"><col style="width:2.2%"><col style="width:12%"><col style="width:4.5%"><col style="width:4.8%"><col style="width:4.8%"><col style="width:3.5%"><col style="width:3%"><col style="width:3%"><col style="width:3.8%"><col style="width:5.2%"><col style="width:4.5%"><col style="width:4%"><col style="width:5.6%"><col style="width:3%"></colgroup><thead><tr>${headers.map(([key, label]) => key === 'rowNo' ? `<th class="row-no-col">${label}</th>` : `<th class="${key !== 'delete' ? 'sortable' : 'delete-col'}" ${key !== 'delete' ? `data-action="sort" data-table="performance" data-key="${key}"` : ''}>${label}</th>`).join('')}</tr></thead><tbody>${body}</tbody></table></div>`;
    }

    function renderLatest() {
      const filters = readLatestFilters();
      let rows = getLatestBalanceRowsRaw().filter(r => {
        if (filters.account !== '전체계좌' && r.account !== filters.account) return false;
        if (filters.status !== '전체' && currentStatus(r) !== filters.status) return false;
        return matchesSearch(r, filters.search);
      });
      rows = applySort(rows, sortState.latest);
      const metrics = getLatestAccountMetrics();
      root.innerHTML = `
        <section class="fixed-list-layout">
          <div class="card">
            <div class="section-title"><h2>계좌별 최신 잔고현황</h2><span class="hint">각 계좌의 최신 잔고와 당일매매 업로드 이력을 함께 반영합니다.</span></div>
            <div class="grid grid-4">${renderLatestMetricCards(metrics)}</div>
          </div>

            <div class="toolbar">
              ${accountFilterHtml('latestAccount', filters.account)}
              <div class="field"><label for="latestStatus">현재현황 필터</label><select id="latestStatus">${['전체','보유','매수','매도'].map(v => `<option ${filters.status === v ? 'selected' : ''}>${v}</option>`).join('')}</select></div>

    function readLatestFilters() {
      return { account: latestFilterState.account || '전체계좌', status: latestFilterState.status || '전체', search: latestFilterState.search || '' };
    }

    function renderLatestMetricCards(metrics) {
      const cards = [...getActiveAccounts().map(a => metrics.byAccount[a] || { account:a, date:'-', count:0, buyAmount:0, evalAmount:0, profit:0 }), metrics.total];
      return cards.map(m => `<div class="metric">
        <div class="label">${esc(m.account)}</div>
        <div class="tiny">기준일 ${esc(m.date || '-')} · 종목수 ${fmtNum(m.count)}</div>
        <div class="value">${fmtNum(m.evalAmount)}원</div>
        <div class="tiny">매입 ${fmtNum(m.buyAmount)}원 · <span class="${profitClass(m.profit)}">손익 ${fmtNum(m.profit)}원</span></div>
      </div>`).join('');
    }

    function getLatestAccountMetrics() {
      const rows = getLatestBalanceRowsRaw();
      const byAccount = {};
      getActiveAccounts().forEach(account => {
        const accountRows = rows.filter(r => r.account === account);
        const date = accountRows[0]?.date || '-';
        byAccount[account] = {
          account,
          date,
          count: accountRows.length,
          buyAmount: accountRows.reduce((s, r) => s + Number(r.buyAmount || 0), 0),
          evalAmount: accountRows.reduce((s, r) => s + Number(r.evalAmount || 0), 0),
          profit: accountRows.reduce((s, r) => s + Number(r.profit || 0), 0)
        };
      });
      const totalRows = rows;
      return {
        byAccount,
        total: {
          account: '전체계좌',
          date: totalRows.map(r => r.date).sort().reverse()[0] || '-',
          count: totalRows.length,
          buyAmount: totalRows.reduce((s, r) => s + Number(r.buyAmount || 0), 0),
          evalAmount: totalRows.reduce((s, r) => s + Number(r.evalAmount || 0), 0),
          profit: totalRows.reduce((s, r) => s + Number(r.profit || 0), 0)
        }
      };
    }

    function tradeToLinkedRow(batch, item) {
      const buyAmount = Number(item.buyPrice || 0) * Number(item.buyQty || 0);
      const sellAmount = Number(item.sellPrice || 0) * Number(item.sellQty || 0);
      const amount = sellAmount || buyAmount || tradeAmount(item);
      return {
        ...item,
        source: 'trade',
        account: batch.account,
        date: batch.date,
        at: batch.at,
        quantity: Math.max(0, Number(item.buyQty || 0) - Number(item.sellQty || 0)),
        buyPrice: Number(item.buyPrice || 0),
        currentPrice: Number(item.currentPrice || 0) || Number(item.sellPrice || 0) || Number(item.buyPrice || 0),
        currentPriceKind: Number(item.sellQty || 0) > 0 ? 'sellPrice' : 'currentPrice',
        dayChangeRate: Number(item.dayChangeRate || 0),
        evalAmount: amount,
        buyAmount,
        sellQty: Number(item.sellQty || 0),
        sellAmount,
        profit: Number(item.profit || 0),
        returnRate: Number(item.returnRate || 0),
        fee: Number(item.feeTax || 0),
        tax: 0,
        weight: 0
      };
    }

    function getLatestBalanceRowsRaw() {
      const map = new Map();
      const sourcePriority = src => normSource(src) === 'balance' ? 2 : (normSource(src) === 'trade' ? 1 : 0);
      const put = (row) => {
        if (!row || !row.stockCode) return;
        const key = opKey(row.account, row.stockCode);
        const prev = map.get(key);
        const stamp = `${row.date || ''} ${row.at || ''}`;
        const prevStamp = prev ? `${prev.date || ''} ${prev.at || ''}` : '';
        if (!prev || stamp > prevStamp || (stamp === prevStamp && sourcePriority(row.source) > sourcePriority(prev.source))) map.set(key, row);
      };
      getActiveAccounts().forEach(account => {
        const batches = app.balances.filter(b => b.account === account && Array.isArray(b.items) && b.items.length);
        if (!batches.length) return;
        batches.sort((a, b) => (b.date + b.at).localeCompare(a.date + a.at));
        const latest = batches[0];
        (latest.items || []).forEach(item => put({ ...item, source: 'balance', account, date: latest.date, at: latest.at }));
      });
      (app.trades || []).forEach(batch => {
        (batch.items || []).forEach(item => put(tradeToLinkedRow(batch, item)));
      });
      return Array.from(map.values()).sort(compareDateSourceDesc);
    }

      if (Number(row.buyQty || 0) > 0) return '매수';
      return '보유';

    function escMultiline(value) {
      return esc(value).replace(/\n/g, '<br>');

    function cleanHtml(html) {
      const template = document.createElement('template');
      template.innerHTML = String(html || '');
      template.content.querySelectorAll('script, style, iframe, object, embed').forEach(node => node.remove());
      template.content.querySelectorAll('*').forEach(node => {
        [...node.attributes].forEach(attr => {
          if (/^on/i.test(attr.name)) node.removeAttribute(attr.name);
          if (attr.name === 'href' && /^javascript:/i.test(attr.value)) node.removeAttribute(attr.name);
        });
      });
      return template.innerHTML;
    }

    function renderRichContent(html, fallbackText) {
      const safe = cleanHtml(html || '');
      if (safe.trim()) return safe;
      return escMultiline(fallbackText || '');

    function plainFromHtml(html) {
      const div = document.createElement('div');
      div.innerHTML = cleanHtml(html || '');
      return div.innerText || '';
    }

    function filterAndSortDailyRows(rows, type) {
      const search = type === 'watch' ? dailyHistoryState.watchSearch : dailyHistoryState.noteSearch;
      const key = type === 'watch' ? (dailyHistoryState.watchSortKey || 'date') : (dailyHistoryState.noteSortKey || 'date');
      const dir = (type === 'watch' ? dailyHistoryState.watchDir : dailyHistoryState.noteDir) === 'asc' ? 1 : -1;
      const q = normalizeText(search);
      return rows.filter(row => {
        const extraText = detailExtraPlainText('dailyDetailExtras', dailyDetailExtraKey(type, row.id));
        if (!q) return true;
        const text = type === 'watch'
          ? `${row.stockName || ''} ${row.reason || ''} ${extraText} ${row.date || ''} ${row.source || ''}`
          : `${row.title || ''} ${row.noteText || ''} ${plainFromHtml(row.noteHtml || '')} ${extraText} ${row.date || ''} ${row.source || ''}`;
        return normalizeText(text).includes(q);
      }).sort((a, b) => {
        const av = a[key] ?? '';
        const bv = b[key] ?? '';
        const dailySortState = { key, sortKey: key, dir: dir === 1 ? 'asc' : 'desc' };
        const cat = categoricalCompare(av, bv, key, dailySortState);
        if (cat !== null) return cat;
        if (['date'].includes(key)) return String(av).localeCompare(String(bv), 'ko-KR') * dir || String(b.id || '').localeCompare(String(a.id || ''), 'ko-KR');
        if (['qty', 'amount', 'profit', 'returnRate', 'dayChangeRate', 'currentPrice', 'avgRate', 'target1', 'target2', 'quantity', 'evalAmount', 'buyAmount'].includes(key)) return (parseNumber(av) - parseNumber(bv)) * dir;
        if (typeof av === 'number' || typeof bv === 'number') return (Number(av || 0) - Number(bv || 0)) * dir;
        return String(av).localeCompare(String(bv), 'ko-KR') * dir || String(b.date || '').localeCompare(String(a.date || ''), 'ko-KR');
      });
    }

    function memoDetailKey(account, code, date, source = '') {

    function getMemoDetail(account, code, date, source = '') {
      app.memoDetails = app.memoDetails || {};
      const key = memoDetailKey(account, code, date, source);
      if (!app.memoDetails[key]) app.memoDetails[key] = { target1: '', target2: '', target1Color: 'black', target2Color: 'black', extraMemo: '', deleted: false };
      return app.memoDetails[key];
    }

    function readMemoDetail(account, code, date, source = '') {
      app.memoDetails = app.memoDetails || {};
      const key = memoDetailKey(account, code, date, source);
      if (app.memoDetails[key]) return app.memoDetails[key];
      return source ? (app.memoDetails[memoDetailKey(account, code, date, '')] || { target1: '', target2: '', target1Color: 'black', target2Color: 'black', extraMemo: '', deleted: false }) : { target1: '', target2: '', target1Color: 'black', target2Color: 'black', extraMemo: '', deleted: false };
    }

    function latestTargetDetailForDisplay(account, code, date, source = '') {
      const base = { ...readMemoDetail(account, code, date, source) };
      const needsLatestTarget = !String(base.target1 || '').trim() && !String(base.target2 || '').trim();
      if (needsLatestTarget && normSource(source) === 'balance') {
        const latest = getLatestMemoDetail(account, code, date, '') || {};
        if (String(latest.target1 || '').trim()) base.target1 = latest.target1;
        if (String(latest.target2 || '').trim()) base.target2 = latest.target2;
        if (latest.target1Color) base.target1Color = latest.target1Color;
        if (latest.target2Color) base.target2Color = latest.target2Color;
      }
      return base;
    }

    function getLatestMemoDetail(account, code, fallbackDate = '', source = '') {
      app.memoDetails = app.memoDetails || {};
      const prefix = `${account}__${code}__`;
      const s = normSource(source);
      const foundKey = Object.keys(app.memoDetails)
        .filter(k => k.startsWith(prefix))
        .filter(k => !s || k.endsWith(`__${s}`))
        .filter(k => {
          const d = app.memoDetails[k] || {};
          return !d.deleted && (String(d.target1 || '').trim() || String(d.target2 || '').trim() || String(d.extraMemo || '').trim());
        })
        .sort()
        .reverse()[0];
      if (foundKey) return app.memoDetails[foundKey];
      return fallbackDate ? readMemoDetail(account, code, fallbackDate, source) : { target1: '', target2: '', target1Color: 'black', target2Color: 'black', extraMemo: '', deleted: false };
    }

    function setMemoDetail(account, code, date, field, value, source = '') {
      const detail = getMemoDetail(account, code, date, source);
      detail[field] = ['target1', 'target2'].includes(field) ? fmtMoneyText(value) : (value || '');
      detail.deleted = false;
      app.memoDetails[memoDetailKey(account, code, date, source)] = detail;
      saveApp();
    }

    function deleteMemoHistoryRow(account, code, date, name, source = '') {
      const ok = confirm(`${name || code} ${date} ${sourceLabel(source)} 메모내역 행을 삭제할까요?
원래 종목 메모는 유지되고, 메모내역 화면에서만 숨김 처리됩니다.`);
      if (!ok) return;
      const detail = getMemoDetail(account, code, date, source);
      detail.target1 = '';
      detail.target2 = '';
      detail.target1Color = 'black';
      detail.target2Color = 'black';
      detail.extraMemo = '';
      detail.deleted = true;
      app.memoDetails[memoDetailKey(account, code, date, source)] = detail;
      saveApp();
      toast('메모내역 행 삭제 완료');
      render();
    }

    function addManualMemo() {
      const date = document.getElementById('manualMemoDate')?.value || selectedDate;
      const account = document.getElementById('manualMemoAccount')?.value || '스윙계좌';
      const stockName = (document.getElementById('manualMemoStockName')?.value || '').trim();
      const target1 = fmtMoneyText(document.getElementById('manualMemoTarget1')?.value || '');
      const target2 = fmtMoneyText(document.getElementById('manualMemoTarget2')?.value || '');
      const returnRate = parseNumber(document.getElementById('manualMemoReturnRate')?.value || 0);
      const dayChangeRate = parseNumber(document.getElementById('manualMemoDayChangeRate')?.value || 0);
      const currentPrice = parseNumber(document.getElementById('manualMemoCurrentPrice')?.value || 0);
      const extraMemo = (document.getElementById('manualMemoExtra')?.value || '').trim();
      if (!stockName) {
        alert('종목명을 입력해 주세요.');
        return;
      }
      if (!extraMemo && !target1 && !target2) {
        alert('메모 또는 목표가를 입력해 주세요.');
        return;
      }
      const id = `manual_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
      app.memoManuals = Array.isArray(app.memoManuals) ? app.memoManuals : [];
      app.memoManuals.push({
        id,
        date,
        account,
        stockCode: id,
        stockName,
        op1: DEFAULT_OP1,
        op2: DEFAULT_OP2,
        target1,
        target2,
        target1Color: 'black',
        target2Color: 'black',
        returnRate,
        dayChangeRate,
        currentPrice,
        todayMemo: '',
        todayMemoHtml: '',
        extraMemo,
        extraMemoHtml: escMultiline(extraMemo),
        classTag: '',
        deleted: false
      });
      saveApp();
      toast('직접 메모 추가 완료');
      render();
    }

    function setManualMemoField(id, field, value) {
      app.memoManuals = Array.isArray(app.memoManuals) ? app.memoManuals : [];
      const row = app.memoManuals.find(item => item.id === id);
      if (!row) return;
      row[field] = ['target1', 'target2'].includes(field) ? fmtMoneyText(value) : (value || '');
      row.deleted = false;
      saveApp();
    }

    function deleteManualMemo(id, name) {
      const ok = confirm(`${name || '직접 추가 메모'} 행을 삭제할까요?
직접 추가한 메모내역만 삭제됩니다.`);
      if (!ok) return;
      app.memoManuals = (app.memoManuals || []).filter(item => item.id !== id);
      saveApp();
      toast('직접 추가 메모 삭제 완료');
      render();
    }

    function getMemoHistoryRows() {
      const map = new Map();
      const addItem = (batch, item, source = '') => {
        const code = item.stockCode;
        if (!code) return;
        const todayMemo = memoOf(batch.account, code, batch.date, source);
        const detail = getMemoDetail(batch.account, code, batch.date, source);
        if (detail.deleted) return;
        if (!String(todayMemo || '').trim() && !String(detail.target1 || '').trim() && !String(detail.target2 || '').trim() && !String(detail.extraMemo || '').trim()) return;
        const key = memoDetailKey(batch.account, code, batch.date, source);
        if (map.has(key)) return;
        const opinion = getOpinion(batch.account, code, batch.date, source);
        map.set(key, {
          key,
          account: batch.account,
          date: batch.date,
          stockCode: code,
          stockName: item.stockName || code,
          source,
          op1: opinion.op1 || DEFAULT_OP1,
          op2: opinion.op2 || DEFAULT_OP2,
          target1: detail.target1 || '',
          target2: detail.target2 || '',
          classTag: getClassTag(batch.account, code, batch.date, source),
          returnRate: Number(item.returnRate || 0),
          dayChangeRate: Number(item.dayChangeRate || 0),
          currentPrice: Number(item.currentPrice || item.sellPrice || item.buyPrice || 0),
          currentPriceKind: normSource(source) === 'trade' && Number(item.sellQty || 0) > 0 ? 'sellPrice' : 'currentPrice',
          todayMemo,
          todayMemoHtml: memoHtmlOf(batch.account, code, batch.date, source) || '',
          extraMemo: detail.extraMemo || '',
          extraMemoHtml: detail.extraMemoHtml || ''
        });
      };
      (app.trades || []).forEach(batch => (batch.items || []).forEach(item => addItem(batch, item, 'trade')));
      (app.balances || []).forEach(batch => (batch.items || []).forEach(item => addItem(batch, item, 'balance')));
      (app.memoManuals || []).forEach(item => {
        if (!item || item.deleted) return;
        const key = item.id || memoDetailKey(item.account || '직접입력', item.stockCode || item.stockName, item.date || selectedDate);
        if (map.has(key)) return;
        map.set(key, {
          key,
          manual: true,
          id: item.id,
          account: item.account || '직접입력',
          date: item.date || selectedDate,
          stockCode: item.stockCode || item.id || '',
          stockName: item.stockName || '직접입력 종목',
          op1: item.op1 || DEFAULT_OP1,
          op2: item.op2 || DEFAULT_OP2,
          target1: item.target1 || '',
          target2: item.target2 || '',
          classTag: item.classTag || '',
          returnRate: Number(item.returnRate || 0),
          dayChangeRate: Number(item.dayChangeRate || 0),
          currentPrice: Number(item.currentPrice || 0),
          currentPriceKind: item.currentPriceKind || '',
          todayMemo: item.todayMemo || '',
          todayMemoHtml: item.todayMemoHtml || '',
          extraMemo: item.extraMemo || '',
          extraMemoHtml: item.extraMemoHtml || ''
        });
      });
      return Array.from(map.values());
    }

    function filterAndSortMemoRows(rows) {
      const q = normalizeText(memoHistoryState.search || '');
      const account = memoHistoryState.account || '전체계좌';
      const key = memoHistoryState.sortKey || 'date';
      const dir = memoHistoryState.dir === 'asc' ? 1 : -1;
      return rows.filter(row => {
        if (account !== '전체계좌' && row.account !== account) return false;
        if (!q) return true;
        const text = `${row.date || ''} ${row.account || ''} ${row.stockName || ''} ${row.stockCode || ''} ${row.op1 || ''} ${row.op2 || ''} ${row.classTag || ''} ${classTagLabel(row.classTag || '')} ${row.target1 || ''} ${row.target2 || ''} ${row.returnRate || ''} ${row.dayChangeRate || ''} ${row.currentPrice || ''} ${row.todayMemo || ''} ${row.extraMemo || ''}`;
        return normalizeText(text).includes(q);
      }).sort((a, b) => {
        const av = a[key] ?? '';
        const bv = b[key] ?? '';
        const cat = categoricalCompare(av, bv, key, memoHistoryState);
        if (cat !== null) return cat;
        if (key === 'date') return String(av).localeCompare(String(bv), 'ko-KR') * dir || sourceOrder(a.source) - sourceOrder(b.source);
        if (['qty', 'amount', 'profit', 'returnRate', 'dayChangeRate', 'currentPrice', 'avgRate', 'target1', 'target2', 'quantity', 'evalAmount', 'buyAmount'].includes(key)) return (parseNumber(av) - parseNumber(bv)) * dir;
        if (typeof av === 'number' || typeof bv === 'number') return (Number(av || 0) - Number(bv || 0)) * dir;
        return String(av).localeCompare(String(bv), 'ko-KR') * dir || String(b.date || '').localeCompare(String(a.date || ''), 'ko-KR');
      });
    }

        return `<tr>

        <td>${stockCell}</td>

        <td class="center"><span class="op-badge op-${esc(row.op2)}">${esc(row.op2)}</span></td>
        <td>${target1Input}</td>
        <td>${target2Input}</td>
        <td class="class-tag-cell">${row.manual ? manualClassTagSelect(row.id) : classTagSelect(row.account, row.stockCode, row.date, '', row.source || '')}</td>
        <td class="num ${profitClass(row.returnRate)}">${fmtRate(row.returnRate)}</td>
        <td class="num ${profitClass(row.dayChangeRate)}">${fmtRate(row.dayChangeRate)}</td>
        <td class="num ${currentPriceClass(row)}">${fmtNum(row.currentPrice)}</td>
        <td class="memo-line" ${todayDetailAttrs} title="더블클릭하면 오늘기록메모 상세내용을 볼 수 있습니다.">${esc(row.todayMemo)}</td>
        <td>${extraInput}</td>
        <td class="delete-col">${deleteButton}</td>
      </tr>`;
      }).join('');
      root.innerHTML = `
        <section class="fixed-list-layout">
          <div class="card">
            <div class="section-title"><h2>메모내역</h2><span class="hint">오늘의 기록에서 종목 메모를 남긴 내역을 날짜별로 모아 봅니다.</span></div>
            <div class="toolbar">
              ${accountFilterHtml('memoHistoryAccount', memoHistoryState.account)}
              <div class="field wide"><label for="memoHistorySearch">종목명 / 메모 / 단어검색</label><input id="memoHistorySearch" type="search" value="${esc(memoHistoryState.search)}" placeholder="종목명, 코드, 메모, 목표가 검색" /></div>
              <button data-action="reset-memo-history-filter">초기화</button>

            <div class="manual-memo-add-box">
              <div class="form-row">
                <input id="manualMemoDate" type="date" value="${esc(selectedDate)}" aria-label="직접 메모 날짜" />
                <select id="manualMemoAccount" aria-label="직접 메모 계좌">${getActiveAccounts().filter(a => a !== '기본계좌').map(a => `<option value="${esc(a)}">${esc(a)}</option>`).join('')}</select>

            ${rows.length ? `<div class="table-wrap rows-25-scroll"><table class="memo-history-table"><colgroup><col style="width:78px"><col style="width:42px"><col style="width:112px"><col style="width:64px"><col style="width:74px"><col style="width:84px"><col style="width:84px"><col style="width:42px"><col style="width:62px"><col style="width:72px"><col style="width:82px"><col style="width:230px"><col style="width:230px"><col style="width:46px"></colgroup><thead><tr>${memoSortHeader('date','날짜')}<th class="row-no-col">번호</th>${memoSortHeader('stockName','종목명')}${memoSortHeader('op1','의견1')}${memoSortHeader('op2','의견2')}${memoSortHeader('target1','목표가1')}${memoSortHeader('target2','목표가2')}${memoSortHeader('classTag','분류')}${memoSortHeader('returnRate','수익률')}${memoSortHeader('dayChangeRate','당일등락률')}${memoSortHeader('currentPrice','현재가')}${memoSortHeader('todayMemo','오늘기록메모')}${memoSortHeader('extraMemo','추가메모')}<th class="delete-col">삭제</th></tr></thead><tbody>${body}</tbody></table></div>` : '<div class="empty">메모내역이 없습니다. 오늘의 기록 업로드 목록에서 종목 메모를 입력하면 여기에 표시됩니다.</div>'}

    function showMemoHistoryDetail(account, code, date, field, manualId = '', source = '') {
      const row = manualId
        ? getMemoHistoryRows().find(item => item.manual && item.id === manualId)
        : getMemoHistoryRows().find(item => item.account === account && item.stockCode === code && item.date === date && (!source || item.source === source));

        alert('메모 상세내용을 찾을 수 없습니다.');
        return;

    function applySort(rows, state) {
      const key = state.key;
      const dir = state.dir === 'asc' ? 1 : -1;
      return [...rows].sort((a, b) => {
        const av = a[key] ?? '';
        const bv = b[key] ?? '';
        const cat = categoricalCompare(av, bv, key, state);
        if (cat !== null) return cat;
        if (['qty', 'amount', 'profit', 'returnRate', 'dayChangeRate', 'currentPrice', 'avgRate', 'target1', 'target2', 'quantity', 'evalAmount', 'buyAmount'].includes(key)) return (parseNumber(av) - parseNumber(bv)) * dir;
        if (typeof av === 'number' || typeof bv === 'number') return (Number(av || 0) - Number(bv || 0)) * dir;
        return String(av).localeCompare(String(bv), 'ko-KR') * dir;
      });
    }

        if (node && typeof node.focus === 'function') {

          if (typeof node.setSelectionRange === 'function') {
            const len = node.value.length;
            const pos = Math.min(caret ?? len, len);
            node.setSelectionRange(pos, pos);
          }
        }
      }, 0);
    }

    function uploadItemKey(item) {
      return String((item && (item.stockCode || item.stockName)) || '').trim();
    }

    function upsertUploadBatch(kind, account, date, items) {
      const list = kind === 'trade' ? app.trades : app.balances;
      let batch = list.find(item => item.account === account && item.date === date);
      if (!batch) {
        batch = { account, date, at: nowStamp(), items: [] };
        list.push(batch);
      }
      const incoming = new Map((items || []).map(item => [uploadItemKey(item), item]).filter(([key]) => key));
      const merged = [];
      const used = new Set();
      (batch.items || []).forEach(oldItem => {
        const key = uploadItemKey(oldItem);
        if (incoming.has(key)) {
          merged.push(incoming.get(key));
          used.add(key);
        } else {
          merged.push(oldItem);
        }
      });
      (items || []).forEach(item => {
        const key = uploadItemKey(item);
        if (key && !used.has(key) && !merged.some(row => uploadItemKey(row) === key)) merged.push(item);
      });
      batch.items = merged;
      batch.at = nowStamp();
      return batch;
    }

    function manualStockCodeFromName(name) {
      const text = normalizeText(name || '직접종목');
      let hash = 0;
      for (let i = 0; i < text.length; i++) hash = ((hash * 31) + text.charCodeAt(i)) >>> 0;
      return `MANUAL_${String(hash).padStart(6, '0')}`;
    }

      if (!box) return;
      box.querySelectorAll('input').forEach(input => { input.value = ''; });

      const op2 = box.querySelector('[data-field="op2"]'); if (op2) { op2.value = DEFAULT_OP2; refreshOpinionControl(op2, DEFAULT_OP2); }

    function addManualUploadItem(kind, account) {
      const box = manualUploadBox(account, kind);

      if (!stockName) { alert('직접 추가할 종목명을 입력해 주세요.'); return; }
      const date = storageDateForUpload(kind, activeUploadBaseDate());
      const stockCode = normalizeStockCode(manualUploadValue(box, 'stockCode')) || manualStockCodeFromName(stockName);
      const qty = parseNumber(manualUploadValue(box, 'qty'));
      const amount = parseNumber(manualUploadValue(box, 'amount'));
      const profit = parseNumber(manualUploadValue(box, 'profit'));
      const returnRate = parseNumber(manualUploadValue(box, 'returnRate'));
      const dayChangeRate = parseNumber(manualUploadValue(box, 'dayChangeRate'));
      const unitPrice = qty ? Math.round(amount / qty) : 0;
      const currentPrice = parseNumber(manualUploadValue(box, 'currentPrice')) || unitPrice;
      const item = kind === 'trade' ? {
        stockCode, stockName, buyPrice: unitPrice, buyQty: qty, sellPrice: 0, sellQty: 0, currentPrice, dayChangeRate, feeTax: 0, profit, returnRate
      } : {
        stockCode, stockName, quantity: qty, buyPrice: unitPrice, currentPrice, evalAmount: amount, buyAmount: amount, profit, returnRate, dayChangeRate, fee: 0, tax: 0, weight: 0
      };
      upsertUploadBatch(kind, account, date, [item]);
      const op1 = manualUploadValue(box, 'op1') || DEFAULT_OP1;
      const op2 = manualUploadValue(box, 'op2') || DEFAULT_OP2;
      app.opinionHistory[opHistKey(account, stockCode, date, kind)] = { op1, op2 };
      app.opinionHistory[opHistKey(account, stockCode, date, '')] = { op1, op2 };
      app.opinion1[opKey(account, stockCode)] = op1;
      app.opinion2[opKey(account, stockCode)] = op2;
      const tag = manualUploadValue(box, 'classTag');
      if (tag) app.classTags[classTagKey(account, stockCode, date, kind)] = tag;
      else delete app.classTags[classTagKey(account, stockCode, date, kind)];
      const target1 = manualUploadValue(box, 'target1');
      const target2 = manualUploadValue(box, 'target2');
      if (target1) setMemoDetail(account, stockCode, date, 'target1', target1, kind);
      if (target2) setMemoDetail(account, stockCode, date, 'target2', target2, kind);
      const memo = manualUploadValue(box, 'memo');
      if (memo) setMemo(account, stockCode, date, memo, '', kind);
      saveApp();
      clearManualUploadBox(box);
      toast(`${stockName} 직접 추가 완료`);
      render();

    async function handleUpload(kind, account) {
      const input = document.querySelector(`input[type="file"][data-file="${kind}"][data-account="${cssEscape(account)}"]`);
      if (!input || !input.files || !input.files[0]) {
        alert('CSV 파일을 먼저 선택해 주세요.');
        return;
      }
      const date = storageDateForUpload(kind, activeUploadBaseDate());
      try {
        const text = await readFileText(input.files[0]);
        const parsed = parseCsv(text);
        const items = kind === 'trade' ? parseTradeItems(parsed) : parseBalanceItems(parsed);
        if (!items.length) {
          alert('읽을 수 있는 종목 데이터가 없습니다. CSV 컬럼명을 확인해 주세요.');
          return;
        }
        resetUploadOpinions(account, items, date, kind);
        upsertUploadBatch(kind, account, date, items);
        saveApp();
        input.value = '';
        toast(`${account} ${date} ${kind === 'trade' ? '당일매매' : '당일잔고'} ${items.length}건 저장`);
        render();
      } catch (e) {
        console.error(e);
        alert('CSV 파일을 읽는 중 오류가 발생했습니다. 파일 형식과 인코딩을 확인해 주세요.');
      }
    }


    function hasStockDataOnDate(account, code, date) {
      const inTrades = app.trades.some(batch => batch.account === account && batch.date === date && (batch.items || []).some(item => item.stockCode === code));
      const inBalances = app.balances.some(batch => batch.account === account && batch.date === date && (batch.items || []).some(item => item.stockCode === code));
      return inTrades || inBalances;
    }

    function deleteUploadedBatch(kind, account) {
      const date = storageDateForUpload(kind, activeUploadBaseDate());
      const label = kind === 'trade' ? '당일매매' : '당일잔고';
      const source = kind === 'trade' ? app.trades : app.balances;
      const targetBatches = source.filter(batch => batch.account === account && batch.date === date);
      const targetItems = targetBatches.flatMap(batch => batch.items || []);
      if (!targetItems.length) {
        alert(`${date} ${account} ${label} 업로드 데이터가 없습니다.`);
        return;
      }
      const ok = confirm(`${account} ${date} ${label} 업로드 전체내용 ${targetItems.length}건을 삭제할까요?
삭제한 업로드 내용은 계좌별 성과, 최신 잔고현황, 종목 리스트, 과거 이력에서 모두 사라집니다.`);
      if (!ok) return;
      const touchedCodes = Array.from(new Set(targetItems.map(item => item.stockCode).filter(Boolean)));
      if (kind === 'trade') {
        app.trades = app.trades.filter(batch => !(batch.account === account && batch.date === date));
      } else {
        app.balances = app.balances.filter(batch => !(batch.account === account && batch.date === date));
      }
      touchedCodes.forEach(code => {
        if (!hasStockDataOnDate(account, code, date)) {
          delete app.opinionHistory[opHistKey(account, code, date, kind)];

    async function readFileText(file) {
      const buffer = await file.arrayBuffer();
      const decoders = ['euc-kr', 'utf-8'];
      for (const enc of decoders) {
        try {
          const text = new TextDecoder(enc, { fatal: false }).decode(buffer);
          if (text && !/^\u0000+$/.test(text)) return text.replace(/^\uFEFF/, '');
        } catch (e) { /* try next */ }
      }
      return new TextDecoder().decode(buffer).replace(/^\uFEFF/, '');
    }

    function parseCsv(text) {
      const sample = text.split(/\r?\n/).find(line => line.trim()) || '';
      const delimiters = [',', '\t', ';'];
      const delimiter = delimiters.map(d => ({ d, c: sample.split(d).length })).sort((a,b) => b.c - a.c)[0].d;
      const rows = [];
      let row = [];
      let cell = '';
      let inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        const next = text[i + 1];
        if (ch === '"') {
          if (inQuotes && next === '"') { cell += '"'; i++; }
          else inQuotes = !inQuotes;
        } else if (ch === delimiter && !inQuotes) {
          row.push(cell.trim()); cell = '';
        } else if ((ch === '\n' || ch === '\r') && !inQuotes) {
          if (ch === '\r' && next === '\n') i++;
          row.push(cell.trim());
          if (row.some(v => String(v).trim() !== '')) rows.push(row);
          row = []; cell = '';
        } else {
          cell += ch;
        }
      }
      row.push(cell.trim());
      if (row.some(v => String(v).trim() !== '')) rows.push(row);
      if (!rows.length) return { headers: [], rows: [] };
      const headerIndex = findHeaderIndex(rows);
      let headers = rows[headerIndex].map(h => String(h || '').trim());
      let dataStart = headerIndex + 1;
      const sub = rows[headerIndex + 1] || [];
      const looksLikeSubHeader = sub.length && sub.slice(0, Math.max(headers.length, sub.length)).some(v => ['평균가', '수량', '단가', '금액'].includes(String(v || '').trim())) && !normalizeStockCode(sub[0] || '');
      if (looksLikeSubHeader) {
        headers = headers.map((h, i) => {
          const s = String(sub[i] || '').trim();
          if (!s) return h;
          return h ? `${h} ${s}`.trim() : s;
        });
        dataStart = headerIndex + 2;
      }
      const seen = {};
      headers = headers.map((h, i) => {
        const base = h || `컬럼${i + 1}`;
        seen[base] = (seen[base] || 0) + 1;
        return seen[base] === 1 ? base : `${base}_${seen[base]}`;
      });
      const dataRows = rows.slice(dataStart).map(arr => {
        const obj = {};
        headers.forEach((h, i) => { obj[h] = arr[i] ?? ''; });
        return obj;
      });
      return { headers, rows: dataRows };
    }

    function findHeaderIndex(rows) {
      const clues = ['종목코드', '종목명', '평가손익', '손익금액', '보유수량', '매도수량'];
      const idx = rows.findIndex(r => clues.some(c => r.join('').includes(c)));
      return idx >= 0 ? idx : 0;
    }

    function findValue(row, candidates) {
      const entries = Object.entries(row);
      for (const c of candidates) {
        const nc = normalizeText(c);
        const exact = entries.find(([k]) => normalizeText(k) === nc);
        if (exact) return exact[1];
      }
      for (const c of candidates) {
        const nc = normalizeText(c);
        const partial = entries.find(([k]) => normalizeText(k).includes(nc) || nc.includes(normalizeText(k)));
        if (partial) return partial[1];
      }
      return '';
    }

    function findValueSafe(row, candidates) {
      const entries = Object.entries(row);
      for (const c of candidates) {
        const nc = normalizeText(c);
        const exact = entries.find(([k]) => normalizeText(k) === nc);
        if (exact) return exact[1];
      }
      for (const c of candidates) {
        const nc = normalizeText(c);
        const partial = entries.find(([k]) => normalizeText(k).includes(nc));
        if (partial) return partial[1];
      }
      return '';
    }

    function findRecentBalanceBuyPrice(account, code, date) {
      const item = findRecentBalanceItem(account, code, date);
      return Number(item?.buyPrice || 0);
    }

    function findRecentBalanceItem(account, code, date) {
      const matches = [];
      app.balances.forEach(batch => {
        if (batch.account !== account || batch.date > date) return;
        (batch.items || []).forEach(item => {
          if (item.stockCode === code) matches.push({ date: batch.date, item });
        });
      });
      matches.sort((a, b) => b.date.localeCompare(a.date));
      return matches[0]?.item || null;
    }

    function resolveTradeSellPriceForHistory(item, account, code, date) {
      const sellQty = Number(item.sellQty || 0);
      const candidates = [
        Number(item.sellPrice || 0),
        Number(item.currentPrice || 0),
        Number(item.sellAvgPrice || 0),
        Number(item.sellUnitPrice || 0)
      ].filter(n => Number.isFinite(n) && n > 0);
      const plausible = candidates.find(n => sellQty <= 0 || Math.abs(n - sellQty) > 0.0001);
      return plausible || candidates[0] || 0;
    }

    function historyDayChangeRateForTrade(item, account, code, date) {
      const own = Number(item.dayChangeRate || 0);
      if (own) return own;
      const bal = findRecentBalanceItem(account, code, date);
      return Number(bal?.dayChangeRate || 0);
    }

    function getHistoryRows(account, code) {
      const rows = [];
      app.trades.forEach((batch, batchIndex) => {
        if (batch.account !== account) return;
        (batch.items || []).forEach((item, itemIndex) => {
          if (item.stockCode !== code) return;
          const isSell = Number(item.sellQty || 0) > 0;
          const detail = readMemoDetail(account, code, batch.date, 'trade');
          const buyPriceForHistory = Number(item.buyPrice || 0) || Number(item.prevBuyPrice || 0) || findRecentBalanceBuyPrice(account, code, batch.date) || Number(item.currentPrice || item.sellPrice || 0);
          const sellPriceForHistory = resolveTradeSellPriceForHistory(item, account, code, batch.date);
          rows.push({
            date: batch.date,
            account,
            type: '당일매매',
            status: isSell ? '매도' : '매수',
            stockName: item.stockName,
            quantity: Number(item.sellQty || 0) || Number(item.buyQty || 0),
            price: buyPriceForHistory,
            amount: tradeAmount(item),
            currentPrice: isSell ? sellPriceForHistory : Number(item.currentPrice || buyPriceForHistory || sellPriceForHistory || 0),
            currentPriceKind: isSell ? 'sellPrice' : 'currentPrice',
            dayChangeRate: historyDayChangeRateForTrade(item, account, code, batch.date),
            profit: Number(item.profit || 0),
            returnRate: Number(item.returnRate || 0),
            target1: detail.target1 || '',
            target2: detail.target2 || '',
            target1Color: detail.target1Color || 'black',
            target2Color: detail.target2Color || 'black',
            source: 'trade',
            batchIndex,
            itemIndex
          });
        });
      });
      app.balances.forEach((batch, batchIndex) => {
        if (batch.account !== account) return;
        const sameDateTrade = app.trades.some(t => t.account === account && t.date === batch.date && (t.items || []).some(i => i.stockCode === code));
        (batch.items || []).forEach((item, itemIndex) => {
          if (item.stockCode !== code) return;
          const qty = Number(item.quantity || 0);
          if (sameDateTrade && qty <= 0) return;
          const detail = readMemoDetail(account, code, batch.date, 'balance');
          rows.push({
            date: batch.date,
            account,
            type: '잔고이력',
            status: currentStatus(item),
            stockName: item.stockName,
            quantity: qty,
            price: Number(item.buyPrice || 0),
            amount: Number(item.evalAmount || 0),
            currentPrice: Number(item.currentPrice || 0),
            currentPriceKind: 'currentPrice',
            dayChangeRate: historyDayChangeRateForTrade(item, account, code, batch.date),
            profit: Number(item.profit || 0),
            returnRate: Number(item.returnRate || 0),
            target1: detail.target1 || '',
            target2: detail.target2 || '',
            target1Color: detail.target1Color || 'black',
            target2Color: detail.target2Color || 'black',
            source: 'balance',
            batchIndex,
            itemIndex
          });
        });
      });
      return rows.sort(compareDateSourceDesc);
    }

    function saveDailyMainDetail(ctx, html, text) {
      if (!ctx || !ctx.type || !ctx.rowId) return false;
      const type = ctx.type;
      const rowId = String(ctx.rowId);
      if (type === 'watch') {
        const m = rowId.match(/^(\d{4}-\d{2}-\d{2})-watch-(\d+)$/);
        if (m) {
          const rec = ensureRecord(m[1]);
          const idx = Number(m[2]);
          rec.watch = Array.isArray(rec.watch) ? rec.watch : [];
          if (!rec.watch[idx]) return false;
          rec.watch[idx].reason = text || plainFromHtml(html);
          rec.watch[idx].reasonHtml = html;
          saveApp();
          return true;
        }
        const extra = (app.watchExtras || []).find(item => String(item.id) === rowId);
        if (extra) {
          extra.reason = text || plainFromHtml(html);
          extra.reasonHtml = html;
          saveApp();
          return true;
        }
      }
      if (type === 'note') {
        const m = rowId.match(/^(\d{4}-\d{2}-\d{2})-note$/);
        if (m) {
          const rec = ensureRecord(m[1]);
          rec.noteHtml = html;
          rec.noteText = text || plainFromHtml(html);
          saveApp();
          return true;
        }
        const extra = (app.noteExtras || []).find(item => String(item.id) === rowId);
        if (extra) {
          extra.noteHtml = html;
          extra.noteText = text || plainFromHtml(html);
          saveApp();
          return true;
        }
      }
      return false;
    }

      if (ctx.manualId) {
        const item = (app.memoManuals || []).find(row => String(row.id) === String(ctx.manualId));
        if (!item) return false;
        if (ctx.field === 'todayMemo') {
          item.todayMemo = text || plainFromHtml(html);
          item.todayMemoHtml = html;
        } else {
          item.extraMemo = text || plainFromHtml(html);
          item.extraMemoHtml = html;

      if (ctx.field === 'todayMemo') {
        setMemo(ctx.account, ctx.code, ctx.date, text || plainFromHtml(html), html, ctx.source || '');

      const detail = getMemoDetail(ctx.account, ctx.code, ctx.date, ctx.source || '');
